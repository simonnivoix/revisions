<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Mes révisions</title>
<!-- iPad : permet « Sur l'écran d'accueil » → app plein écran -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Révisions">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EAF0F6">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230369A1'/%3E%3Ctext x='90' y='128' font-size='104' text-anchor='middle'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
<style>
  /* Palette neutre « slate » : fond neutre clair, un seul accent bleu.
     Règle 60-30-10 — les couleurs rouge/orange/jaune/vert ne servent QUE l'indicateur
     de maîtrise (barres, %, courbe), jamais la décoration ou la navigation. */
  :root{
    --bg:#EAF0F6;          /* 60% fond (bleu-gris frais, fait ressortir les cartes) */
    --bg2:#D8E2EC;         /* pistes de barres / sliders */
    --card:#FFFFFF;        /* 30% surfaces */
    --ink:#0F172A;         /* texte principal */
    --muted:#4F5E6C;       /* texte secondaire / labels (assombri pour le contraste AA) */
    --line:#D8E2EC;        /* bordures fines */
    --primary:#0369A1;     /* 10% accent : liens, focus, CTA */
    --rouge:#DC2626; --orange:#F97316; --jaune:#CA8A04; --vert:#16A34A;
    --shadow:0 1px 3px rgba(15,23,42,.08);
    --ring:rgba(3,105,161,.16);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);min-height:100vh;
       transition:background-color .3s ease,color .3s ease}
  .wrap{max-width:920px;margin:0 auto;padding:30px 22px 60px}
  .ic{display:inline-block;vertical-align:middle;flex-shrink:0}

  /* ---------- En-tête ---------- */
  header{margin-bottom:22px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
  .tagline{color:var(--muted);font-size:13px;margin-top:4px;display:flex;align-items:center;gap:6px}
  .gpill{font-weight:700}
  .iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;
           justify-content:center;min-width:44px;min-height:44px;border-radius:10px;padding:0;transition:.15s}
  .iconbtn:hover{color:var(--primary);background:var(--bg2)}
  .iconbtn:active{transform:scale(.94)}

  /* ---------- Vue accueil : grille de matières ---------- */
  .grid{display:flex;flex-wrap:wrap;gap:14px;align-items:start}
  .grid .mcard{flex:0 1 230px}   /* largeur ~230, s'allonge selon le plus long mot (pas de coupe), sans se gonfler pour remplir la ligne */
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;color:var(--ink);
         box-shadow:var(--shadow);position:relative;text-align:left;
         display:grid;grid-template-columns:1fr auto auto;align-items:center;column-gap:12px;row-gap:12px;
         transition:transform .2s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease,background-color .3s ease,border-color .3s ease,color .3s ease;
         animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards}
  .mcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.10)}
  .mcard:active{transform:translateY(-1px) scale(.992)}
  .mcard.done{border-color:var(--vert)}
  .mcard.done .go{color:var(--vert)}
  .mcard .top{min-width:min-content}
  .mcard .name{font-size:16px;font-weight:600;line-height:1.25;display:flex;align-items:center;gap:9px}
  .mcard .name .nm{overflow-wrap:normal;word-break:normal}
  .mcard .mdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .mcard .meta{font-size:12px;font-weight:500;color:var(--muted);margin-top:3px}
  .mcard .pct{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.02em;text-align:right;white-space:nowrap}
  .mcard .pct .u{font-size:15px;font-weight:500;color:var(--muted);margin-left:1px}
  .mcard .pbar{grid-column:1/-1;height:7px;border-radius:5px;background:var(--bg2);overflow:hidden}
  .mcard .pbar>span{display:block;height:100%;border-radius:5px;transition:width .55s cubic-bezier(.22,.61,.36,1),background .3s}
  .mcard .go{color:var(--muted);display:inline-flex;align-self:center;opacity:.55}
  .addcard{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line);
           background:transparent;box-shadow:none;color:var(--muted);font-size:14px;font-weight:600;min-height:90px}
  .addcard:hover{border-color:var(--primary);color:var(--primary);transform:none;box-shadow:none}

  /* ---------- État vide ---------- */
  .empty{max-width:380px;margin:46px auto;text-align:center;color:var(--ink);animation:rise .4s ease backwards}
  .bookic{color:var(--muted);display:inline-flex}
  .empty h2{font-size:18px;font-weight:600;margin:10px 0 8px}
  .empty p{font-size:14px;line-height:1.5;color:var(--muted);margin:0 0 22px}
  .cta{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:none;
       font-size:16px;font-weight:600;padding:12px 22px;border-radius:12px;cursor:pointer;font-family:inherit;transition:.15s}
  .cta:hover{filter:brightness(1.07)}
  .cta:active{transform:scale(.97)}

  /* ---------- Vue détail matière ---------- */
  .back{background:none;border:none;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;
        padding:6px 0;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .back:hover{opacity:.78}
  .back:active{transform:scale(.97)}
  .dhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .dhead h2{margin:0;font-size:22px;font-weight:600;flex:1;line-height:1.2;display:flex;align-items:center;gap:10px}
  .dhead .mdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
  .dhead .dotbtn{background:none;border:none;padding:9px;margin:-9px;cursor:pointer;display:inline-flex;align-items:center;border-radius:50%;flex-shrink:0}
  .dhead .dotbtn:active{transform:scale(.9)}
  .badge{font-weight:700;font-size:15px;color:#fff;padding:4px 12px;border-radius:999px}
  .dsub{color:var(--muted);font-size:12px;margin:0 0 18px}

  .chap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:10px;
        box-shadow:var(--shadow);animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards;
        transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease,background-color .3s ease,border-color .3s ease,color .3s ease}
  .chap:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,23,42,.08)}
  .chap.done{border-color:var(--vert)}
  .chap .top{display:flex;align-items:center;gap:8px}
  .chap .cname{font-size:15px;font-weight:500;flex:1;min-width:0;line-height:1.3;overflow-wrap:normal;word-break:normal}
  .chap .cdone{color:var(--vert);display:inline-flex}
  .chap .cpct{font-size:15px;font-weight:700;min-width:42px;flex-shrink:0;text-align:right}
  .chap .bar{height:8px;border-radius:5px;background:var(--bg2);overflow:hidden;margin:10px 0 0}
  .chap .bar>span{display:block;height:100%;border-radius:5px;transition:width .5s cubic-bezier(.22,.61,.36,1),background .3s}
  .chap .ctrl{display:flex;align-items:center;gap:10px;margin-top:11px}

  /* Curseur gris neutre, rendu identique sur tous les navigateurs (pas de remplissage coloré). */
  .chap input[type=range]{-webkit-appearance:none;appearance:none;flex:1;min-width:120px;
        height:32px;background:transparent;cursor:pointer;margin:0}
  .chap input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-moz-range-track{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-moz-range-progress{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
        border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22);margin-top:-8px;
        transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .chap input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
        background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22);
        transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .chap input[type=range]:active::-webkit-slider-thumb,.chap input[type=range]:focus-visible::-webkit-slider-thumb{
        transform:scale(1.2);border-color:var(--primary);box-shadow:0 0 0 7px var(--ring),0 1px 4px rgba(0,0,0,.28)}
  .chap input[type=range]:active::-moz-range-thumb,.chap input[type=range]:focus-visible::-moz-range-thumb{
        transform:scale(1.2);border-color:var(--primary);box-shadow:0 0 0 7px var(--ring),0 1px 4px rgba(0,0,0,.28)}

  .seegraph{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--line);color:var(--muted);
            border-radius:9px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
            white-space:nowrap;transition:.15s;min-height:40px}
  .seegraph:hover{border-color:var(--primary);color:var(--primary)}
  .seegraph.on{border-color:var(--primary);color:var(--primary)}
  .seegraph:active{transform:scale(.96)}
  .delc{background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;
        justify-content:center;min-width:44px;min-height:44px;border-radius:10px;padding:0;transition:.15s}
  .delc:hover{color:var(--rouge)}
  .delc:active{transform:scale(.94)}
  .chap .delc{opacity:.55;min-width:40px;min-height:40px}
  .chap .delc:hover{opacity:1}
  .dtrash{color:var(--muted)}

  /* ---------- Graphe d'évolution de la maîtrise ---------- */
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
            margin-bottom:18px;box-shadow:var(--shadow)}
  .chartbox h3{margin:0 0 10px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .chartsvg{width:100%;height:auto;display:block;font-family:inherit}
  .chartsvg .cg{stroke:var(--line);stroke-width:1}
  .chartsvg .cyl{fill:var(--muted);font-size:11px;text-anchor:end}
  .chartsvg .cxl{fill:var(--muted);font-size:11px;text-anchor:middle}
  .chartempty{color:var(--muted);font-size:13px;margin:6px 0 2px}
  .minichart{display:none;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
  .minichart.open{display:block}
  .minichart .chartsvg{width:100%;height:auto;display:block}
  .chartsvg circle{cursor:pointer}
  .cname,.dhead h2{cursor:text}

  .add-row{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px dashed var(--line);
           border-radius:12px;padding:0 14px;margin-bottom:14px;color:var(--muted);transition:.15s}
  .add-row:focus-within{border-color:var(--primary);color:var(--primary)}
  .addchap{flex:1;background:none;border:none;padding:15px 0;font-size:16px;color:var(--ink);font-family:inherit}
  .addchap::placeholder{color:var(--muted)}
  .addchap:focus{outline:none}

  /* ---------- Menu réglages (overlay) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;
           padding:56px 16px;z-index:50;animation:fade .2s ease}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:360px;
         max-height:calc(100vh - 112px);overflow:auto;
         box-shadow:0 14px 44px rgba(15,23,42,.28);animation:rise .25s cubic-bezier(.22,.61,.36,1)}
  .panel.wide{max-width:640px}
  .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .phead>span{font-size:16px;font-weight:600}
  .plabel{font-size:11px;font-weight:600;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.05em}
  .topt{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1px solid transparent;border-radius:10px;
        padding:9px 10px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink);min-height:44px;transition:.12s;margin-bottom:2px}
  .topt:hover{background:var(--bg2)}
  .topt.on{border-color:var(--primary)}
  .tdot{width:18px;height:18px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);flex-shrink:0}
  .tlabel{flex:1;text-align:left}
  .tcheck{color:var(--primary);display:none}
  .topt.on .tcheck{display:inline-flex}
  .dbtn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1px solid var(--line);border-radius:10px;
        padding:0 14px;min-height:46px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
        margin-bottom:8px;transition:.12s}
  .dbtn:hover{border-color:var(--primary);color:var(--primary)}
  .dbtn:active{transform:scale(.98)}
  .dbtn.danger{color:var(--rouge)}
  .dbtn.danger:hover{border-color:var(--rouge);color:var(--rouge)}
  .pfoot{font-size:12px;color:var(--muted);margin:14px 0 0;text-align:center}

  /* ---------- Navigation Maîtrise / Temps ---------- */
  .nav{display:inline-flex;background:var(--bg2);border-radius:11px;padding:3px;gap:2px;margin-top:14px}
  .navt{border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);
        padding:8px 16px;border-radius:9px;cursor:pointer;min-height:40px;transition:.15s}
  .navt.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .navt:active{transform:scale(.97)}

  /* ---------- Page « Temps de travail » ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;
        box-shadow:var(--shadow);animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards}
  /* Choix de la matière + lancement */
  .sessionwrap{min-height:58vh;display:flex;align-items:center}
  .sessioncard{width:100%}
  .sesshead{text-align:center;margin-bottom:18px;color:var(--ink)}
  .sesshead svg{color:var(--primary)}
  .sesshead h2{margin:6px 0 5px;font-size:20px;font-weight:600}
  .sesshead p{margin:0 auto;max-width:300px;font-size:13px;color:var(--muted);line-height:1.45}
  .sessioncard .matchips{justify-content:center}
  .matchips{display:flex;flex-wrap:wrap;gap:9px;margin:6px 0 16px}
  .matchip{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);border:1.5px solid transparent;
           border-radius:999px;padding:9px 15px;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
           cursor:pointer;min-height:42px;transition:.15s}
  .matchip .dot{width:12px;height:12px;border-radius:50%;background:var(--c);flex-shrink:0}
  .matchip.on{border-color:var(--c);background:var(--card)}
  .matchip:active{transform:scale(.97)}
  .bigbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:none;border-radius:14px;
          font-family:inherit;font-size:17px;font-weight:700;color:#fff;padding:16px;cursor:pointer;min-height:56px;transition:.15s}
  .bigbtn:active{transform:scale(.985)}
  .bigwork{background:var(--primary)}
  .bigwork:disabled{opacity:.4;cursor:default}
  .bigstop{background:var(--ink);color:var(--card)}
  .bigbreathe{background:var(--bg2);color:var(--ink);border:1px solid var(--line);margin-top:10px;font-size:15px;font-weight:600;padding:14px}
  .bigbreathe svg{color:var(--primary)}

  /* ---------- Méditation (« Respire ») ---------- */
  .brov{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;align-items:center;justify-content:center;animation:fade .25s ease}
  .brwrap{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;padding:28px 20px;max-width:360px;width:100%}
  .brquit{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:12px;border:1px solid var(--line);
          background:var(--card);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .brhint{margin:0;font-size:14px;color:var(--muted);max-width:260px;line-height:1.5}
  .brcircle{width:190px;height:190px;border-radius:50%;
            background:radial-gradient(circle at 50% 42%, var(--primary), transparent 72%);
            box-shadow:0 0 55px rgba(99,102,241,.22);
            animation:breathe 8s ease-in-out infinite;margin:6px 0}
  .brphase{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:.01em}
  .brtime{font-size:30px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  .brdurs{display:flex;gap:8px}
  .brdur{background:var(--bg2);border:1.5px solid transparent;border-radius:999px;padding:8px 16px;font-family:inherit;
         font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;min-height:40px;transition:.15s}
  .brdur.on{border-color:var(--primary);background:var(--card)}
  .brchain{margin:0;font-size:13px;color:var(--muted);max-width:280px;line-height:1.45}
  .brstart{max-width:300px;margin-top:2px}
  @keyframes breathe{0%,100%{transform:scale(.6)}50%{transform:scale(1)}}
  /* Session en cours — mode focus plein écran (couvre la barre d'onglets) */
  .focusov{position:fixed;inset:0;z-index:55;background:var(--bg);overflow:auto;display:flex;flex-direction:column;
           align-items:center;justify-content:flex-start;animation:fade .25s ease;
           padding:max(28px,env(safe-area-inset-top)) 20px max(28px,env(safe-area-inset-bottom))}
  .focuswrap{width:100%;max-width:360px;margin:auto 0;text-align:center}
  .focuswrap .mixer{margin-top:18px}
  .focuswrap .bigstop{margin-top:8px}
  /* Session en cours */
  .runcard{text-align:center}
  .runtop{display:inline-flex;align-items:center;gap:9px;margin-bottom:2px}
  .rdot{width:14px;height:14px;border-radius:50%;background:var(--c)}
  .rname{font-size:16px;font-weight:600}
  .rtimer{font-size:46px;font-weight:700;font-variant-numeric:tabular-nums;margin:6px 0 6px;color:var(--ink);line-height:1}
  .rstate{font-size:12px;color:var(--muted);margin-bottom:18px;display:inline-flex;align-items:center;gap:6px}
  .rsound{background:none;border:none;color:var(--primary);font-family:inherit;font-size:12px;font-weight:600;
          cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:0}
  .rwarn{font-size:12px;font-weight:600;color:var(--ink);background:var(--bg2);border-radius:9px;
         padding:8px 12px;margin:0 0 14px;display:inline-flex;align-items:center;gap:7px}
  .note{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
        padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--ink);animation:rise .3s ease backwards}
  .note .nclose{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;
                padding:4px;border-radius:8px;flex-shrink:0}
  .note .nclose:hover{color:var(--ink)}
  .rvol{display:flex;align-items:center;gap:11px;margin:0 0 18px;color:var(--muted)}
  .volrange{-webkit-appearance:none;appearance:none;flex:1;height:32px;background:transparent;cursor:pointer;margin:0}
  .volrange::-webkit-slider-runnable-track{height:6px;border-radius:5px;background:var(--bg2)}
  .volrange::-moz-range-track{height:6px;border-radius:5px;background:var(--bg2)}
  .volrange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
        background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22);margin-top:-7px}
  .volrange::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22)}
  /* Graphe façon « temps d'écran » */
  .seg{display:inline-flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;margin-bottom:14px}
  .segb{border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
        padding:7px 14px;border-radius:8px;cursor:pointer;min-height:40px;transition:.15s}
  .segb.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .segb:active{transform:scale(.97)}
  .navper{display:flex;align-items:center;gap:10px;margin:2px 0 8px}
  .pnav{background:none;border:1px solid var(--line);border-radius:9px;min-width:40px;min-height:40px;
        display:inline-flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:.15s}
  .pnav:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
  .pnav:active:not(:disabled){transform:scale(.95)}
  .pnav:disabled{opacity:.35;cursor:default}
  .plabelw{font-size:13px;font-weight:600;color:var(--ink)}
  .sttotal{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .stsub{font-size:12px;color:var(--muted);margin:3px 0 16px}
  /* Graphe temps : SVG fait main façon « temps d'écran » (grille + axe à droite + moyenne).
     Réutilise .chartsvg/.cg/.cyl/.cxl du graphe de maîtrise ; barres = couleurs des matières. */
  .timesvg{width:100%;height:auto;display:block;margin:2px 0 2px}
  .chartsvg .cavg{stroke:var(--muted);stroke-width:1.2;stroke-dasharray:4 3}
  .chartsvg .cay{fill:var(--muted);font-size:11px;text-anchor:start}
  .chartsvg rect{transition:none}
  .legend{margin-top:6px;border-top:1px dashed var(--line);padding-top:10px}
  .legrow{display:flex;align-items:center;gap:11px;padding:7px 0}
  .legdot{width:15px;height:15px;border-radius:4px;background:var(--c);border:none;cursor:pointer;flex-shrink:0;padding:0;
          box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);transition:transform .12s}
  .legdot:active{transform:scale(.9)}
  .legname{flex:1;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legtime{font-size:14px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  /* Pastille de couleur (modale création) : la couleur choisie ; taper ouvre le sélecteur maison. */
  .nmcolor{display:block;width:100%;height:46px;border-radius:12px;cursor:pointer;padding:0;
           border:1.5px solid var(--line);box-shadow:inset 0 0 0 2px rgba(255,255,255,.18)}
  /* Sélecteur de couleur maison (popover) */
  .cpickov{position:fixed;inset:0;z-index:70}
  .cpickpanel{position:fixed;width:220px;background:var(--card);border:1px solid var(--line);border-radius:14px;
              box-shadow:0 12px 34px rgba(15,23,42,.28);padding:12px;display:flex;flex-direction:column;gap:10px}
  .cpsv{position:relative;width:100%;height:140px;border-radius:9px;cursor:crosshair;touch-action:none;
        box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)}
  .cpsvthumb{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #fff;
             box-shadow:0 0 0 1px rgba(0,0,0,.4);transform:translate(-50%,-50%);pointer-events:none}
  .cphue{-webkit-appearance:none;appearance:none;width:100%;height:14px;border-radius:8px;cursor:pointer;
         background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
  .cphue::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;
                               background:#fff;border:2px solid rgba(0,0,0,.35);cursor:pointer}
  .cphue::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.35);cursor:pointer}
  .cprow{display:flex;align-items:center;gap:9px}
  .cpprev{width:30px;height:30px;border-radius:8px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)}
  .cphex{flex:1;min-width:0;font-family:inherit;font-size:16px;border:1px solid var(--line);border-radius:8px;
         background:var(--bg2);color:var(--ink);padding:7px 9px;text-transform:uppercase}

  /* ---------- Modale maison (renommer / ajouter / supprimer) ---------- */
  .mdmsg{font-size:14px;color:var(--ink);line-height:1.5;margin:2px 0 16px}
  .mdinput{width:100%;border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:12px;
           padding:12px 14px;font-family:inherit;font-size:16px;outline:none;margin-bottom:16px}
  .mdinput:focus{border-color:var(--primary)}
  .mdactions{display:flex;gap:10px;justify-content:flex-end}
  .mdbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:11px;padding:11px 18px;
         font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;transition:.15s}
  .mdbtn:hover{border-color:var(--primary)}
  .mdbtn:active{transform:scale(.97)}
  .mdbtn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .mdbtn.danger{background:var(--rouge);color:#fff;border-color:var(--rouge)}

  /* ---------- Tactile (iPad / iPhone) ---------- */
  button,input,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .cname,.dhead h2{touch-action:manipulation;-webkit-user-select:none;user-select:none}
  @media (hover:none){
    .mcard:hover,.chap:hover{transform:none}
    .mcard:hover{box-shadow:var(--shadow)}
  }

  /* ---------- Navigation : sidebar à gauche (desktop) ---------- */
  :root{--sbw:230px}   /* largeur de la sidebar */
  /* Contenu large et CENTRÉ dans l'espace restant (max 1160px), marges généreuses → look « logiciel », pas « appli téléphone ». */
  .wrap{max-width:none;margin-left:var(--sbw);
        padding:0 max(48px, calc((100vw - var(--sbw) - 1160px) / 2)) 80px}

  /* ---------- Barre du haut : stats persistantes + CTA (façon tableau de bord) ---------- */
  /* Collée en haut (sticky) : reste visible sur toutes les pages quand on descend. */
  .topbar{position:sticky;top:0;z-index:30;background:var(--bg);
          display:flex;align-items:center;gap:34px;margin-bottom:26px;
          padding:30px 0 20px;border-bottom:1px solid var(--line)}
  .tbstat{display:flex;flex-direction:column;gap:3px}
  .tbstat .k{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .tbstat .v{font-size:19px;font-weight:700;letter-spacing:-.01em;color:var(--ink);
             display:inline-flex;align-items:center;gap:2px}
  .tbstat .tbflame{display:inline-flex;color:#F97316}   /* même orange que le bandeau série de l'accueil */
  .tbcta{margin-left:auto;background:var(--primary);color:#fff;border:none;border-radius:12px;
         font-family:inherit;font-size:14.5px;font-weight:600;padding:12px 20px;cursor:pointer;
         display:inline-flex;align-items:center;gap:9px;transition:.15s;box-shadow:var(--shadow)}
  .tbcta:hover{filter:brightness(1.06)}
  .tbcta:active{transform:scale(.98)}
  /* Desktop : la barre du haut couvre déjà Série + Temps → on retire les doublons de l'accueil. */
  @media (min-width:821px){
    #accueil .streak{display:none}
    #accueil .statgrid{grid-template-columns:1fr}
    #accueil .statgrid .statcard:last-child{display:none}
    #accueil .panel{max-width:none}   /* « À faire » / « Aujourd'hui » pleine largeur sur grand écran */
    #accueil .acccta{display:none}     /* « Nouvelle session » de la barre du haut suffit sur desktop */
  }
  .tabbar{position:fixed;top:0;left:0;bottom:0;z-index:40;width:var(--sbw);
          display:flex;flex-direction:column;gap:4px;background:var(--card);
          border-right:1px solid var(--line);padding:18px 14px;overflow-y:auto}
  /* En-tête de marque en haut de la sidebar */
  .sbbrand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;font-weight:700;
           font-size:17px;letter-spacing:-.01em;color:var(--ink)}
  .sbbrand .logo{width:30px;height:30px;border-radius:9px;background:var(--primary);color:#fff;
                 display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sbsect{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
          color:var(--muted);padding:10px 10px 4px;opacity:.7}
  .tab{background:none;border:none;cursor:pointer;font-family:inherit;color:var(--muted);
       display:flex;flex-direction:row;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;
       text-align:left;transition:color .15s,background .15s}
  .tab .tabic{display:inline-flex}
  .tab .tablbl{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .tab:hover{background:var(--bg2);color:var(--ink)}
  .tab:active{transform:scale(.98)}
  .tab.on{color:var(--primary);background:var(--ring)}
  /* Pied de sidebar : mode offline */
  .sbfoot{margin-top:auto;padding:12px 10px 4px;font-size:12px;font-weight:600;color:var(--muted);
          display:flex;align-items:center;gap:8px}
  .sbfoot .dotlive{width:8px;height:8px;border-radius:50%;background:var(--vert)}

  /* ---------- Repli en barre du bas sur écran étroit (mobile / iPad portrait) ---------- */
  @media (max-width:820px){
    .wrap{margin:0 auto;max-width:920px;padding:30px 22px 118px}
    .topbar{display:none}   /* sur mobile, l'accueil montre déjà série + temps du jour */
    .tabbar{top:auto;left:50%;right:auto;bottom:max(16px,env(safe-area-inset-bottom));
            transform:translateX(-50%);flex-direction:row;gap:2px;width:calc(100% - 28px);max-width:430px;
            height:auto;border:1px solid var(--line);border-radius:22px;padding:7px 8px;
            box-shadow:0 8px 28px rgba(15,23,42,.18);justify-content:space-between;overflow:visible}
    .tab{flex:1;flex-direction:column;gap:3px;padding:6px 2px;border-radius:14px;
         min-height:52px;justify-content:center;align-items:center;text-align:center}
    .tab .tablbl{font-size:11px}
    .tab:hover{background:none;color:var(--muted)}
    .tab.on{background:none;color:var(--primary)}
    .sbbrand,.sbsect,.sbfoot{display:none}   /* pas de marque/pied en mode barre */
  }
  @media (max-width:520px){ .grid .mcard{flex-basis:100%} }   /* cartes pleine largeur sur téléphone (pas de vide à droite) */

  /* ---------- Titres de page ---------- */
  .ptitle{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 18px}
  .ptitle h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-.02em}
  .ptitle .sub{color:var(--muted);font-size:14px;margin-top:3px}
  .addbtn{background:var(--primary);color:#fff;border:none;cursor:pointer;display:inline-flex;align-items:center;
          justify-content:center;width:44px;height:44px;border-radius:12px;flex-shrink:0;transition:.15s}
  .addbtn:hover{filter:brightness(1.07)}
  .addbtn:active{transform:scale(.94)}

  /* ---------- Accueil (tableau de bord) ---------- */
  .hello{margin:2px 0 18px}
  .hello h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-.02em}
  .hello p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .statcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);
            animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards}
  .statcard .lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .statcard .big{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-top:6px}
  .statcard .big .u{font-size:16px;font-weight:500;color:var(--muted)}
  .statcard .mini{font-size:13px;color:var(--muted);margin-top:6px}
  .seclabel{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 10px}
  .seclabel .t{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .seclabel .lk{background:none;border:none;color:var(--primary);font-family:inherit;font-size:13px;font-weight:600;
                cursor:pointer;padding:0}
  .seclabel .lk:active{transform:scale(.97)}
  .prevlist{display:flex;flex-direction:column;gap:9px}
  .prevrow{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;background:var(--card);
           border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;
           text-align:left;color:var(--ink);font-family:inherit;animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards;transition:transform .18s}
  .prevrow:active{transform:scale(.99)}
  .prevrow.bosser{display:flex;padding:0;align-items:stretch;overflow:hidden}
  .bosswork{flex:1;min-width:0;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;
            padding:12px 14px;background:none;border:0;color:inherit;font-family:inherit;text-align:left;cursor:pointer;transition:transform .18s}
  .bosswork:active{transform:scale(.99)}
  .bossgraph{flex-shrink:0;width:52px;display:flex;align-items:center;justify-content:center;background:none;
             border:0;border-left:1px solid var(--line);color:var(--muted);cursor:pointer;transition:transform .18s}
  .bossgraph:active{transform:scale(.9)}
  .prevrow .pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .prevrow .pmid{min-width:0}
  .prevrow .pnm{font-size:15px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prevrow .pbar2{height:6px;border-radius:4px;background:var(--bg2);overflow:hidden;margin-top:6px}
  .prevrow .pbar2>span{display:block;height:100%;border-radius:4px}
  .prevrow .ppct{font-size:16px;font-weight:700;min-width:44px;text-align:right}
  .prevrow .psub{display:block;font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---------- Série (streak) ---------- */
  .streak{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
          border-radius:16px;padding:13px 15px;margin-bottom:14px;box-shadow:var(--shadow);animation:rise .4s ease backwards}
  .streak .fl{display:flex;color:var(--muted);flex-shrink:0}
  .streak .fl.on{color:#F97316}
  .streak .stxt{display:flex;flex-direction:column;min-width:0}
  .streak .stxt .n{font-size:16px;font-weight:700;line-height:1.2}
  .streak .stxt .sub{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* ---------- Recap du jour ---------- */
  .recap{padding:14px 16px;display:flex;flex-direction:column;gap:9px;animation:rise .4s ease backwards}
  .recap .rcline{display:flex;align-items:center;gap:9px;font-size:14px;line-height:1.35;color:var(--ink)}
  .recap .rcline .ic{color:var(--muted);flex-shrink:0}
  .recap .rcline .cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .recap .rchips{display:flex;flex-wrap:wrap;gap:7px;margin:-2px 0 2px 25px}
  .recap .rchip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:999px;
                padding:4px 10px;font-size:12.5px;color:var(--ink)}
  .recap .rchip .cdot{width:8px;height:8px;border-radius:50%}
  .rcempty{font-size:13.5px;color:var(--muted);margin:0;line-height:1.45}
  .recap .rcmore{font-size:13px;color:var(--muted);font-style:italic}

  /* ---------- To-do ---------- */
  .todo{padding:6px 14px 14px;animation:rise .4s ease backwards}
  .todogroup{padding-top:8px}
  .todoglabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 2px}
  .todorow{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line)}
  .todogroup .todorow:last-child{border-bottom:none}
  .todochk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);background:var(--card);
           display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:#fff;transition:.15s}
  .todochk .ic{opacity:0;transition:opacity .15s}
  .todochk.on{background:var(--vert);border-color:var(--vert)}
  .todochk.on .ic{opacity:1}
  .todotxt{font-size:14.5px;line-height:1.3;word-break:break-word}
  .todotxt.done{text-decoration:line-through;color:var(--muted)}
  .tododel{color:var(--muted);width:34px;height:34px}
  .todoseg{display:flex;gap:8px;margin:14px 0 8px}
  .tseg{flex:1;background:var(--bg2);border:1.5px solid transparent;border-radius:999px;padding:8px 10px;
        font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;min-height:40px;transition:.15s}
  .tseg.on{background:var(--primary);color:#fff}
  .todoadd{display:flex;gap:8px}
  .todoadd input{flex:1;border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:12px;
                 padding:11px 13px;font-family:inherit;font-size:16px;outline:none;min-width:0}
  .todoadd input:focus{border-color:var(--primary)}
  .addbtn{background:var(--primary);color:#fff;border:none;border-radius:12px;width:46px;flex-shrink:0;
          display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .addbtn:active{transform:scale(.95)}

  /* ---------- Agenda (onglet Session) ---------- */
  .sessionwrap.withag{min-height:auto;display:block;margin-bottom:0}
  .agendacard{padding:16px}
  .aghdr{display:flex;align-items:center;gap:9px;color:var(--ink);margin-bottom:4px}
  .aghdr .ic{color:var(--primary)}
  .aghdr h3{margin:0;font-size:17px;font-weight:700}
  .agnav{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 12px}
  .agarrow{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);
           display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .agarrow:active{transform:scale(.94)}
  .aglabel{font-size:14.5px;font-weight:700;min-width:150px;text-align:center}
  .aglist{display:flex;flex-direction:column;gap:2px}
  .agday{padding:6px 0}
  .agday.today .aghead{color:var(--primary)}
  .aghead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--muted);
          text-transform:uppercase;letter-spacing:.03em;margin:4px 0 4px}
  .aghead .agdow{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;
                 background:var(--bg2);color:var(--ink);font-size:11px}
  .agday.today .aghead .agdow{background:var(--primary);color:#fff}
  .agempty{font-size:13px;color:var(--muted);opacity:.75;padding:2px 0 2px 28px}
  .agtask{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:5px 0}
  .agtxt{display:flex;align-items:center;gap:9px;min-width:0;background:var(--bg2);border:1px solid var(--line);
         border-radius:11px;padding:10px 12px;font-family:inherit;color:var(--ink);cursor:pointer;text-align:left;transition:.15s}
  .agtxt:active{transform:scale(.99)}
  .agtxt .cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .agtxt .agname{font-size:14.5px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .agtxt.done{opacity:.6}
  .agtxt.done .agname{text-decoration:line-through;color:var(--muted)}
  .agtxt .agplay{display:inline-flex;color:var(--primary);flex-shrink:0;margin-left:auto}
  .agadd{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  .agpicklbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px}
  .matchips.mini{margin:0 0 14px;justify-content:flex-start}
  .matchip.mini{padding:7px 12px;font-size:13px;min-height:36px}
  .matchip.mini .dot{width:10px;height:10px}
  .agdays{display:flex;gap:6px;margin-bottom:14px}
  .agdaypick{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg2);border:1.5px solid transparent;
             border-radius:12px;padding:7px 0;font-family:inherit;color:var(--ink);cursor:pointer;min-height:48px;transition:.15s}
  .agdaypick span{font-size:11px;color:var(--muted)}
  .agdaypick b{font-size:15px;font-weight:700}
  .agdaypick.td b{color:var(--primary)}
  .agdaypick.on{background:var(--primary);border-color:var(--primary)}
  .agdaypick.on span,.agdaypick.on b{color:#fff}
  .agdaypick.past{opacity:.32;cursor:not-allowed}
  .agday.pastday .aghead{opacity:.5}
  .agtask.late{grid-template-columns:auto 1fr auto auto}
  .agreb{width:40px;height:40px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--orange);
         display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
  .agreb:active{transform:scale(.92)}
  .rbgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px}
  .rbchip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:var(--bg2);
          border:1.5px solid transparent;border-radius:10px;cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .15s}
  .rbchip span{font-size:11px;color:var(--muted)}
  .rbchip b{font-size:15px;font-weight:700}
  .rbchip.on{background:var(--primary);border-color:var(--primary)}
  .rbchip.on span,.rbchip.on b{color:#fff}
  .rbchip:active{transform:scale(.94)}
  .aglate{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:13px;padding:10px 12px;margin-bottom:14px}
  .aglatehd{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--orange);
            text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
  /* « À faire aujourd'hui » (Accueil) */
  .todaytasks{padding:12px 14px;display:flex;flex-direction:column;gap:2px;animation:rise .4s ease backwards}
  .latebanner{display:flex;align-items:center;gap:8px;width:100%;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);
              border-radius:11px;padding:10px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--orange);
              cursor:pointer;margin-bottom:8px;text-align:left}

  /* ---------- Mélangeur d'ambiances (Session) ---------- */
  .mixlbl{display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:600;color:var(--muted);
          text-transform:uppercase;letter-spacing:.04em;margin:2px 0 12px}
  .mixer{display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;margin:0 0 18px}
  .sndcell{display:flex;flex-direction:column;align-items:center;gap:7px;opacity:.62;transition:opacity .18s}
  .sndcell.on{opacity:1}
  .sndic{color:var(--ink);display:flex}
  .sndcell.on .sndic{color:var(--primary)}
  .sndlbl{font-size:12.5px;font-weight:600;color:var(--ink);text-align:center}
  .sndcell .volrange.sndrange{flex:none;width:100%;height:32px}

  /* ---------- Réglages : aperçu ---------- */
  .counts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:2px 0 4px}
  .countcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
  .countcard .n{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .countcard .l{font-size:11px;color:var(--muted);margin-top:3px}
  #reglages .panel{max-width:none;box-shadow:none;border:none;padding:0;background:none;overflow:visible;max-height:none;animation:none}
  #reglages .secblock{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}

  .hidden{display:none}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  button:focus-visible,input:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;animation-delay:0!important;transition-duration:.001ms!important}
  }
</style>

<script>

const STORE_KEY = "suivi-revisions-bac";
const THEME_KEY = "suivi-revisions-bac-theme";

// ---- Icônes (SVG inline, cohérentes : trait 1.5, currentColor) ----

  'rain':'<path d="M7 15a4 4 0 01-.5-7.96A5 5 0 0116.5 8.5 3.5 3.5 0 0117.5 15"/><path d="M8 19l-1 2M12 19l-1 2M16 19l-1 2"/>',

  'wind':'<path d="M3 8h10a2.5 2.5 0 10-2.5-2.5"/><path d="M3 12h15a3 3 0 11-3 3"/><path d="M3 16h8a2 2 0 11-2 2"/>',
  'soundwave':'<path d="M2 12h2l2-6 4 15 3-11 2 6 2-4h3"/>',
  'bird':'<path d="M2 18c5 0 8-2 10-6 1.4-2.8 3.4-4.5 6.5-4.5 1.6 0 2.5.9 2.5 2.2 0 1.8-1.8 2.6-3.5 2.6"/><path d="M13 7l3.5-3"/><path d="M9 13l-2 6"/>',
  'bowl':'<path d="M3 10c0 4.2 4 7.5 9 7.5s9-3.3 9-7.5"/><path d="M3 10c0-1.6 4-2.6 9-2.6s9 1 9 2.6"/><path d="M16.5 4.5l2.5 4.5"/>',
};
function ic(name,size){ size=size||20; return `<svg class="ic" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name]||''}</svg>`; }

// ---- Ambiances : clair (slate) par défaut, + sauge (chaud) + sombre (zinc) ----
const THEMES = {
  slate: {label:"Clair",  vars:{}},
  sauge: {label:"Sauge",  vars:{'--bg':'#E7EEE0','--bg2':'#D3DEC6','--card':'#FBFCF9','--ink':'#20271C',
                                '--muted':'#67735C','--line':'#D3DEC6','--primary':'#4F7A52',
                                '--shadow':'0 1px 3px rgba(32,39,28,.09)','--ring':'rgba(79,122,82,.18)'}},
  sombre:{label:"Sombre", vars:{'--bg':'#09090B','--bg2':'#27272A','--card':'#18181B','--ink':'#FAFAFA',
                                '--muted':'#A1A1AA','--line':'#3F3F46','--primary':'#38BDF8',
                                '--rouge':'#F87171','--orange':'#FB923C','--jaune':'#FACC15','--vert':'#34D399',
                                '--shadow':'0 1px 3px rgba(0,0,0,.4)','--ring':'rgba(56,189,248,.20)'}},
};
// Base claire complète : permet de revenir proprement après le mode sombre (couleurs maîtrise incluses).
const LIGHT_DEFAULTS = {
  '--bg':'#EAF0F6','--bg2':'#D8E2EC','--card':'#FFFFFF','--ink':'#0F172A','--muted':'#4F5E6C','--line':'#D8E2EC',
  '--primary':'#0369A1','--rouge':'#DC2626','--orange':'#F97316','--jaune':'#CA8A04','--vert':'#16A34A',
  '--shadow':'0 1px 3px rgba(15,23,42,.08)','--ring':'rgba(3,105,161,.16)'
};

// Renvoie le vrai thème à peindre : 'auto' suit le système (sombre/clair).
function effectiveTheme(name){
  if(name==='auto'){
    try{ return matchMedia('(prefers-color-scheme: dark)').matches ? 'sombre' : 'slate'; }catch(e){ return 'slate'; }
  }
  return THEMES[name] ? name : 'slate';
}
function applyTheme(name){
  if(name!=='auto' && !THEMES[name]) name='slate';
  const t = THEMES[effectiveTheme(name)];
  const root = document.documentElement;
  Object.entries(LIGHT_DEFAULTS).forEach(([k,v])=>root.style.setProperty(k,v)); // base claire
  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));          // puis l'ambiance
  localStorage.setItem(THEME_KEY, name);
  document.querySelectorAll('.topt').forEach(s=>s.classList.toggle('on', s.dataset.t===name));
}
// Liste des options de thème, avec « Auto » en plus (suit le système).
const THEME_OPTS = [['slate','Clair'],['sauge','Sauge'],['sombre','Sombre'],['auto','Auto']];
function buildThemeOpts(active){
  const box = document.getElementById('themeOpts');
  if(!box) return;
  box.innerHTML = THEME_OPTS.map(([k,label])=>{
    const eff = effectiveTheme(k);
    const bg = THEMES[eff].vars['--bg']||LIGHT_DEFAULTS['--bg'];
    const ac = THEMES[eff].vars['--primary']||LIGHT_DEFAULTS['--primary'];
    return `<button class="topt${k===active?' on':''}" data-t="${k}" onclick="applyTheme('${k}')">
      <span class="tdot" style="background:linear-gradient(135deg,${bg},${ac})"></span>
      <span class="tlabel">${label}</span>
      <span class="tcheck">${ic('check',18)}</span>
    </button>`;
  }).join('');
}
// Suivi du changement de thème système quand « Auto » est sélectionné.
try{ matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
  if((localStorage.getItem(THEME_KEY)||'')==='auto') applyTheme('auto');
}); }catch(e){}

// ---------- Page Réglages ----------
function renderReglages(){
  const r=document.getElementById('reglages');
  r.classList.remove('hidden'); r.classList.remove('fade'); void r.offsetWidth; r.classList.add('fade');
  r.innerHTML=`
    <div class="ptitle"><div><h1>Réglages</h1></div></div>
    <div class="panel">
      <div class="secblock">
        <p class="plabel">Apparence</p>
        <div id="themeOpts"></div>
      </div>
      <div class="secblock">
        <p class="plabel">Mes données</p>
        <button class="dbtn" onclick="exportData()">${ic('download')}<span>Sauvegarder</span></button>
        <button class="dbtn" onclick="document.getElementById('importFile').click()">${ic('upload')}<span>Importer</span></button>
        <button class="dbtn danger" onclick="resetData()">${ic('reset')}<span>Réinitialiser</span></button>
      </div>
      <p class="pfoot">Tout est enregistré sur cet appareil, sans internet.</p>
    </div>`;
  buildThemeOpts(localStorage.getItem(THEME_KEY)||'slate');
}

const DEFAULT = { matieres:[], sessions:[], active:null };  // démarre vide (matières du bac à ajouter)
const MAX_SESSION_H = 4;                        // au-delà : session présumée oubliée
const MAX_SESSION_MS = MAX_SESSION_H*3600000;

// Palette d'identité des matières (distincte, lisible en clair comme en sombre).
const MAT_PALETTE = ['#0EA5E9','#8B5CF6','#EC4899','#F59E0B','#10B981','#6366F1',
                     '#14B8A6','#F97316','#A855F7','#84CC16','#06B6D4','#E11D48'];
function genId(i){ return 'm'+Date.now().toString(36)+'-'+(i||0)+'-'+Math.floor(Math.random()*1e6).toString(36); }
// Première couleur libre de la palette (puis cyclique si tout est pris). `used` est muté.
function pickColor(used){
  for(const c of MAT_PALETTE){ if(!used.has(c)){ used.add(c); return c; } }
  const c=MAT_PALETTE[used.size % MAT_PALETTE.length]; used.add(c); return c;
}

let data = load();
let current = null;       // index matière ouverte, ou null = grille des matières
let page = 'accueil';     // 'accueil' | 'matieres' | 'session' | 'stats' | 'reglages'
let armed = null;         // id de la matière sélectionnée avant de lancer une session
let period = 'jour';      // période du graphe temps : 'jour' | 'semaine'
let periodOffset = 0;     // décalage de fenêtre : 0 = courante, -1 = précédente, …
let tick = null;          // intervalle d'affichage du chrono en cours
let staleRecovered = false; // une session oubliée a été annulée au chargement → note à afficher
let chartDom = [0,1];     // [tmin,tmax] (rembourré) partagé par les graphes de la matière ouverte
let chartReal = [0,0];    // vraie plage [min,max] des points, avant rembourrage

function load(){ try{const r=localStorage.getItem(STORE_KEY); if(r) return backfillDaily(prepare(JSON.parse(r)));}catch(e){} return prepare(clone(DEFAULT)); }
let saveError=false;
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); saveError=false; }
  catch(e){ if(!saveError){ saveError=true;
    alert("Impossible d'enregistrer : mémoire pleine ou navigation privée. Va dans Réglages → Sauvegarder pour exporter tes données."); } }
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
// Garantit que chaque chapitre a un historique de points {t,p} ; nettoie l'ancien champ "last".
function prepare(d){
  (d.matieres||[]).forEach(m=>{
    if(!Array.isArray(m.chapitres)) m.chapitres=[];   // garde-fou : une matière a toujours un tableau de chapitres
    if(typeof m.nom!=='string') m.nom='Sans nom';
    m.chapitres.forEach(c=>{
      c.pct=Math.max(0,Math.min(100,+c.pct||0));
      if(!Array.isArray(c.hist)||!c.hist.length) c.hist=[{t:dateKey(Date.now())+'T12:00:00.000Z', p:c.pct}];
      delete c.last;
    });
  });
  // Brique « Temps » : chaque matière reçoit un id stable + une couleur d'identité (rétro-compatible).
  if(!Array.isArray(d.sessions)) d.sessions=[];
  if(!('active' in d)) d.active=null;
  if(!Array.isArray(d.todos)) d.todos=[];   // agenda (onglet Session) : {id,txt,mat,date,done,doneAt,created}
  d.todos.forEach(t=>{                       // migration de l'ancien modèle {when:'demain'|'semaine'} → date réelle + matière
    if(!t.date){ const b=new Date(); b.setHours(0,0,0,0); b.setDate(b.getDate()+(t.when==='demain'?1:0)); t.date=dateKey(b.getTime()); }
    if(!('mat' in t)) t.mat=null;
    delete t.when;
  });
  const used=new Set((d.matieres||[]).map(m=>m.color).filter(Boolean));
  (d.matieres||[]).forEach((m,i)=>{
    if(!m.id) m.id=genId(i);
    if(!m.color) m.color=pickColor(used);
  });
  return d;
}
// La courbe se construit toute seule dans le temps : pour chaque chapitre, on ajoute
// un point par jour (à la dernière valeur connue) entre le dernier point enregistré et
// aujourd'hui. Idempotent. Lancé à chaque chargement/import.
function backfillDaily(d){
  const todayStr=dateKey(Date.now());   // jour LOCAL (aligné sur les sessions et l'agenda)
  (d.matieres||[]).forEach(m=>(m.chapitres||[]).forEach(c=>{
    if(!Array.isArray(c.hist)||!c.hist.length) return;
    c.hist.sort((a,b)=>new Date(a.t)-new Date(b.t));
    // 1) la courbe atteint aujourd'hui : un point « aujourd'hui » à la dernière valeur connue
    const last=c.hist[c.hist.length-1];
    if(last.t.slice(0,10) < todayStr) c.hist.push({t:todayStr+'T12:00:00.000Z', p:last.p});
    // 2) compactage : on retire les points intermédiaires égaux à leurs DEUX voisins.
    //    Un palier plat ne garde que ses deux extrémités → stockage borné au nombre de
    //    changements (plus O(jours)), tout en conservant exactement la forme en marches.
    const h=c.hist; if(h.length<=2) return;
    const out=[h[0]];
    for(let i=1;i<h.length-1;i++){ if(!(h[i].p===h[i-1].p && h[i].p===h[i+1].p)) out.push(h[i]); }
    out.push(h[h.length-1]);
    c.hist=out;
  }));
  return d;
}

function couleur(p){ if(p<=20)return getCSS('--rouge'); if(p<=40)return getCSS('--orange'); if(p<=60)return getCSS('--jaune'); return getCSS('--vert'); }
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function moyenne(ch){ return ch.length?Math.round(ch.reduce((s,c)=>s+(+c.pct||0),0)/ch.length):0; }
function fmtDate(iso){ return iso?new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):''; }
function escapeH(s){ return (s+'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ---------- Rendu ----------
const PAGE_IDS = ['accueil','home','detail','temps','stats','reglages'];
function render(){
  // onglet actif (la page "matieres" couvre la grille ET le détail)
  document.querySelectorAll('#tabbar .tab').forEach(b=>b.classList.toggle('on', b.dataset.p===page));
  // on masque tout puis on affiche la bonne page
  PAGE_IDS.forEach(id=>document.getElementById(id).classList.add('hidden'));
  if(page==='accueil'){ renderAccueil(); }
  else if(page==='matieres'){ if(current===null) renderHome(); else renderDetail(); }
  else if(page==='session'){ renderTemps(); }
  else if(page==='stats'){ renderStats(); }
  else if(page==='reglages'){ renderReglages(); }
  renderFocus();   // mode focus plein écran si une session est active (couvre la barre d'onglets)
  updateTopbar();
  save();
}
// Barre du haut (desktop) : série + temps du jour, toujours visibles quelle que soit la page.
function updateTopbar(){
  const s=document.getElementById('tbStreak'); if(!s) return;
  const n=streakDays();
  // Flamme = icône SVG (cohérent avec le bandeau série de l'accueil, pas d'emoji isolé).
  s.innerHTML = n>0 ? `<span class="tbflame">${ic('flame',16)}</span> ${n} jour${n>1?'s':''}` : 'Aucune série';
  const w=todayWorkMs();
  document.getElementById('tbToday').textContent = w>0 ? fmtDur(w) : '0 min';
}
function goPage(p){ page=p; render(); window.scrollTo({top:0}); }

// Maîtrise globale sur TOUS les chapitres de toutes les matières (ou null si aucun chapitre).
function globalMoyenne(){
  const all = data.matieres.flatMap(m=>m.chapitres);
  return all.length ? moyenne(all) : null;
}
// Temps de travail cumulé aujourd'hui (sessions dont le début est aujourd'hui).
function todayWorkMs(){
  const d=new Date(); d.setHours(0,0,0,0); const start=d.getTime(), end=start+86400000;
  return (data.sessions||[]).reduce((s,x)=>{ const t=Date.parse(x.start);
    return (x.end && t>=start && t<end) ? s+Math.max(0,Date.parse(x.end)-t) : s; },0);
}

// ---------- Page Accueil (tableau de bord) ----------
// Jour local (minuit) en ms — sert aux comparaisons « aujourd'hui ».
function localDay(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
// Ensemble des jours (minuit local) ayant au moins une session terminée.
function sessionDaySet(){ const s=new Set(); (data.sessions||[]).forEach(x=>{ if(x.end) s.add(localDay(Date.parse(x.start))); }); return s; }
// Série : jours consécutifs avec ≥1 session, terminant aujourd'hui (ou hier, pour ne pas
// casser la série en début de journée avant la 1re session).
function streakDays(){
  const set=sessionDaySet(); if(!set.size) return 0;
  const DAY=86400000, today=localDay(Date.now());
  let cur = set.has(today) ? today : (set.has(today-DAY) ? today-DAY : null);
  if(cur===null) return 0;
  let n=0; while(set.has(cur)){ n++; cur-=DAY; }
  return n;
}
// « À bosser » : chapitres les plus faibles (≤40) + matières délaissées (aucune session depuis 4 j).
function aBosser(){
  const out=[], DAY=86400000, today=localDay(Date.now());
  const weak=[];
  data.matieres.forEach((m,mi)=>m.chapitres.forEach(c=>{ if((+c.pct||0)<=40) weak.push({mi,m,c}); }));
  weak.sort((a,b)=>(+a.c.pct||0)-(+b.c.pct||0));
  weak.slice(0,3).forEach(w=>out.push({mi:w.mi, color:w.m.color, txt:w.c.nom, sub:'Maîtrise faible', pct:+w.c.pct||0}));
  // matières avec chapitres mais pas travaillées depuis 4 j (et pas déjà listées via un chap faible)
  const lastByMat={}; (data.sessions||[]).forEach(x=>{ if(x.end){ const d=localDay(Date.parse(x.start)); if(!lastByMat[x.mat]||d>lastByMat[x.mat]) lastByMat[x.mat]=d; } });
  const shown=new Set(out.map(o=>o.mi));
  data.matieres.forEach((m,mi)=>{ if(!m.chapitres.length||shown.has(mi)) return;
    const last=lastByMat[m.id]; const days=last?Math.round((today-last)/DAY):999;
    if(days>=4) out.push({mi, color:m.color, txt:m.nom, sub:last?`Pas révisée depuis ${days} jour${days>1?'s':''}`:'Jamais travaillée', pct:moyenne(m.chapitres)});
  });
  return out.slice(0,4);
}
// Recap du jour (compilé automatiquement) : temps, répartition, chapitres modifiés, tâches faites.
function recapToday(){
  const today=localDay(Date.now());
  const work=todayWorkMs();
  const perMat={};
  (data.sessions||[]).forEach(x=>{ if(x.end && localDay(Date.parse(x.start))===today){ perMat[x.mat]=(perMat[x.mat]||0)+Math.max(0,Date.parse(x.end)-Date.parse(x.start)); } });
  const changed=[];
  data.matieres.forEach(m=>m.chapitres.forEach(c=>{ const h=c.hist||[]; if(h.length<2) return;
    const last=h[h.length-1], prev=h[h.length-2];
    if(localDay(Date.parse(last.t))===today && last.p!==prev.p) changed.push({nom:c.nom, from:prev.p, to:last.p, color:m.color});
  }));
  const done=(data.todos||[]).filter(t=>t.done && t.doneAt && localDay(Date.parse(t.doneAt))===today);
  return {work, perMat, changed, done};
}

// ---------- Agenda (onglet Session) ----------
// Une tâche est datée et rattachée à une matière ; la taper pré-arme cette matière pour lancer la session.
let agendaOffset=0;   // semaine affichée : 0 = courante, +1 = suivante, -1 = précédente…
let agMat=null;       // matière sélectionnée pour la nouvelle tâche
let agDayISO=null;    // jour (YYYY-MM-DD) sélectionné pour la nouvelle tâche

const DOW_LET=['L','M','M','J','V','S','D'];
const MONTHS_AB=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
function dateKey(ms){ const d=new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey(){ return dateKey(Date.now()); }
// Lundi 00:00 (local) de la semaine décalée de `offset` semaines.
function mondayOf(offset){ const d=new Date(); d.setHours(0,0,0,0); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow+offset*7); return d.getTime(); }
function weekDays(offset){ const mon=mondayOf(offset),out=[]; for(let i=0;i<7;i++){ const ms=mon+i*86400000,d=new Date(ms); out.push({ms, iso:dateKey(ms), let:DOW_LET[i], num:d.getDate(), mon:MONTHS_AB[d.getMonth()]}); } return out; }
function weekLabel(offset){ if(offset===0)return 'Cette semaine'; if(offset===1)return 'Semaine prochaine'; if(offset===-1)return 'Semaine dernière'; const d=weekDays(offset); return `${d[0].num} ${d[0].mon} – ${d[6].num} ${d[6].mon}`; }
function isPast(iso){ return iso < todayKey(); }   // jour révolu (comparaison de chaînes YYYY-MM-DD = ok)
function shiftAgenda(n){ agendaOffset+=n; agDayISO=null; refreshTemps(); }
function setAgMat(id){ agMat=(agMat===id?null:id); refreshTemps(); }
function setAgDay(iso){ if(isPast(iso)) return; agDayISO=iso; refreshTemps(); }   // pas de planif dans le passé

function addTask(){
  const inp=document.getElementById('agInput'); if(!inp) return;
  const v=(inp.value||'').trim(); if(!v) return;
  if(!agDayISO || isPast(agDayISO)) return;   // sécurité : jamais sur un jour passé
  const mat = agMat || (data.matieres[0]&&data.matieres[0].id) || null;
  data.todos.push({id:'t'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36), txt:v, mat, date:agDayISO, done:false, doneAt:null, created:new Date().toISOString()});
  inp.value=''; save(); refreshTemps(); const ni=document.getElementById('agInput'); if(ni) ni.focus();
}
function toggleTodo(id){ const t=(data.todos||[]).find(x=>x.id===id); if(!t) return; t.done=!t.done; t.doneAt=t.done?new Date().toISOString():null; save(); refreshTodos(); }
function delTodo(id){ data.todos=(data.todos||[]).filter(x=>x.id!==id); save(); refreshTodos(); }
// Reporter une tâche en retard : ouvre un choix du jour (auj., demain, 2 semaines à venir).
function reschedulePick(id){
  const t=(data.todos||[]).find(x=>x.id===id); if(!t) return;
  const base=new Date(); base.setHours(0,0,0,0);
  let chips='';
  for(let i=0;i<14;i++){ const ms=base.getTime()+i*86400000, d=new Date(ms), iso=dateKey(ms);
    const lbl = i===0?'Auj.' : i===1?'Dem.' : DOW_LET[(d.getDay()+6)%7];
    chips+=`<button class="rbchip${iso===t.date?' on':''}" onclick="doReschedule('${id}','${iso}')"><span>${lbl}</span><b>${d.getDate()}</b></button>`;
  }
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="panel" role="dialog" aria-modal="true">
    <div class="phead"><span>Reporter à…</span>
      <button class="iconbtn" aria-label="Fermer" onclick="closeModal(null)">${ic('x')}</button></div>
    <p class="mdmsg">${escapeH(t.txt)}</p>
    <div class="rbgrid">${chips}</div></div>`;
  modalResolve=null; m.classList.remove('hidden');
}
function doReschedule(id,iso){
  const t=(data.todos||[]).find(x=>x.id===id); if(!t) return;
  t.date=iso; t.done=false; t.doneAt=null; save();
  const m=document.getElementById('modal'); m.classList.add('hidden'); m.innerHTML='';
  refreshTodos();
}
// Bosser une matière depuis l'Accueil (À bosser) : pré-arme la matière et bascule sur l'onglet Travail.
function workSubject(mi){ const m=data.matieres[mi]; if(!m) return; if(!data.active) armed=m.id; goPage('session'); }
// Taper une tâche dans l'agenda (onglet Session) : pré-arme sa matière et remonte au lanceur.
function armFromTask(id){ const t=(data.todos||[]).find(x=>x.id===id); if(!t||data.active) return; if(t.mat&&matById(t.mat)) armed=t.mat; renderTemps(); window.scrollTo({top:0,behavior:'smooth'}); }
// Taper une tâche depuis l'Accueil : pré-arme sa matière et bascule sur l'onglet Session.
function goWorkTask(id){ const t=(data.todos||[]).find(x=>x.id===id); if(!t) return; if(t.mat&&matById(t.mat)&&!data.active) armed=t.mat; goPage('session'); }
// Re-rend la page concernée (en préservant le champ d'ajout sur Session).
function refreshTemps(){ const inp=document.getElementById('agInput'); const v=inp?inp.value:''; renderTemps(); const ni=document.getElementById('agInput'); if(ni) ni.value=v; }
function refreshTodos(){ if(page==='session') refreshTemps(); else render(); }

// Ligne de tâche réutilisable. `mode` : 'arm' (agenda) → tape = arme la matière ; 'late' ajoute le report.
function taskRow(t, late){
  const m=matById(t.mat), col=m?m.color:'var(--muted)';
  return `<div class="agtask${late?' late':''}">
    <button class="todochk ${t.done?'on':''}" onclick="toggleTodo('${t.id}')" aria-label="Cocher">${ic('check',14)}</button>
    <button class="agtxt ${t.done?'done':''}" onclick="armFromTask('${t.id}')">
      <span class="cdot" style="background:${col}"></span><span class="agname">${escapeH(t.txt)}</span>
      ${(m&&!t.done&&!data.active)?`<span class="agplay">${ic('play',13)}</span>`:''}
    </button>
    ${late?`<button class="agreb" onclick="reschedulePick('${t.id}')" title="Reporter à un autre jour" aria-label="Reporter à un autre jour">${ic('reset',15)}</button>`:''}
    <button class="iconbtn tododel" onclick="delTodo('${t.id}')" title="Supprimer" aria-label="Supprimer la tâche">${ic('x',16)}</button>
  </div>`;
}
function agendaCard(){
  const days=weekDays(agendaOffset), tk=todayKey();
  // jour d'ajout par défaut : aujourd'hui s'il est dans la semaine, sinon le 1er jour non passé (ou aucun si semaine révolue)
  if(!agDayISO || !days.some(x=>x.iso===agDayISO) || isPast(agDayISO)){
    const future=days.find(x=>!isPast(x.iso)); agDayISO = future?future.iso:null;
  }
  const nav=`<div class="agnav">
    <button class="agarrow" onclick="shiftAgenda(-1)" aria-label="Semaine précédente">${ic('chevleft',18)}</button>
    <span class="aglabel">${weekLabel(agendaOffset)}</span>
    <button class="agarrow" onclick="shiftAgenda(1)" aria-label="Semaine suivante">${ic('chevron',18)}</button></div>`;
  // En retard (global, indépendant de la semaine affichée) : tâches passées non faites.
  const overdue=(data.todos||[]).filter(t=>!t.done && isPast(t.date)).sort((a,b)=>a.date<b.date?-1:1);
  const lateBlock = overdue.length
    ? `<div class="aglate"><div class="aglatehd">${ic('clock',15)}<span>En retard · ${overdue.length} à replanifier</span></div>
        ${overdue.map(t=>taskRow(t,true)).join('')}</div>`
    : '';
  const blocks=days.map(d=>{
    // une tâche passée non faite migre dans le bloc « En retard » → on ne la montre plus dans son jour
    const tasks=(data.todos||[]).filter(t=>t.date===d.iso && !(isPast(d.iso) && !t.done));
    const rows=tasks.map(t=>taskRow(t,false)).join('');
    return `<div class="agday${d.iso===tk?' today':''}${isPast(d.iso)?' pastday':''}">
      <div class="aghead"><span class="agdow">${d.let}</span>${d.num} ${d.mon}${d.iso===tk?` · Aujourd'hui`:''}</div>
      ${rows||`<div class="agempty">—</div>`}</div>`;
  }).join('');
  const matChips=data.matieres.map(m=>`<button class="matchip mini${agMat===m.id?' on':''}" style="--c:${m.color}" onclick="setAgMat('${m.id}')"><span class="dot"></span>${escapeH(m.nom)}</button>`).join('');
  const dayChips=days.map(d=>{ const past=isPast(d.iso);
    return `<button class="agdaypick${agDayISO===d.iso?' on':''}${d.iso===tk?' td':''}${past?' past':''}" ${past?'disabled':''} onclick="setAgDay('${d.iso}')"><span>${d.let}</span><b>${d.num}</b></button>`;
  }).join('');
  const add = agDayISO
    ? `<div class="agadd">
        <div class="agpicklbl">Matière de la tâche</div>
        <div class="matchips mini">${matChips}</div>
        <div class="agpicklbl">Jour</div>
        <div class="agdays">${dayChips}</div>
        <div class="todoadd">
          <input id="agInput" type="text" placeholder="Nouvelle tâche…" maxlength="120" onkeydown="if(event.key==='Enter')addTask()">
          <button class="addbtn" onclick="addTask()" aria-label="Ajouter la tâche">${ic('plus',18)}</button>
        </div></div>`
    : `<div class="agadd"><p class="rcempty">Semaine passée — on ne planifie que sur aujourd'hui ou plus tard. Reviens à <b>Cette semaine</b> pour ajouter une tâche.</p></div>`;
  return `<div class="card agendacard">
    <div class="aghdr">${ic('list',20)}<h3>Mon agenda</h3></div>
    ${lateBlock}${nav}<div class="aglist">${blocks}</div>${add}</div>`;
}

function renderAccueil(){
  const a=document.getElementById('accueil');
  a.classList.remove('hidden'); a.classList.remove('fade'); void a.offsetWidth; a.classList.add('fade');
  const moy=globalMoyenne();
  const work=todayWorkMs();
  const hello=`<div class="hello"><h1>Salut 👋</h1><p>Voici où tu en es aujourd'hui.</p></div>`;

  // — Série —
  const st=streakDays();
  const streak=`<div class="streak">
    <span class="fl ${st>0?'on':''}">${ic('flame',22)}</span>
    <span class="stxt">${st>0
      ? `<span class="n">${st} jour${st>1?'s':''} d'affilée</span><span class="sub">Continue, ne casse pas la série !</span>`

  </div>`;

  const stats=`<div class="statgrid">

      ${moy===null
        ? `<div class="mini" style="margin-top:10px">Pas encore de chapitre</div>`

    </div>
    <div class="statcard">
      <div class="lbl">Travail aujourd'hui</div>
      <div class="big">${fmtDur(work)}</div>
    </div>
  </div>`;
  const cta=`<button class="cta acccta" style="width:100%;justify-content:center" onclick="goPage('session')">${ic('clock',20)}<span>Lancer une session</span></button>`;

  // — À faire aujourd'hui (depuis l'agenda) —
  let today='';
  const tk=todayKey();
  const tdayTasks=(data.todos||[]).filter(t=>t.date===tk);
  const overdue=(data.todos||[]).filter(t=>!t.done && t.date<tk);
  if(tdayTasks.length || overdue.length){
    const late = overdue.length
      ? `<button class="latebanner" onclick="goPage('session')">${ic('clock',16)}<span>${overdue.length} tâche${overdue.length>1?'s':''} en retard — voir l'agenda</span></button>`

    const rows = tdayTasks.length
      ? tdayTasks.map(t=>{ const m=matById(t.mat), col=m?m.color:'var(--muted)';
          return `<div class="agtask">
            <button class="todochk ${t.done?'on':''}" onclick="toggleTodo('${t.id}')" aria-label="Cocher">${ic('check',14)}</button>
            <button class="agtxt ${t.done?'done':''}" onclick="goWorkTask('${t.id}')">
              <span class="cdot" style="background:${col}"></span><span class="agname">${escapeH(t.txt)}</span>
              ${(m&&!t.done&&!data.active)?`<span class="agplay">${ic('play',13)}</span>`:''}
            </button>
            <button class="iconbtn tododel" onclick="delTodo('${t.id}')" title="Supprimer" aria-label="Supprimer la tâche">${ic('x',16)}</button>
          </div>`;}).join('')
      : `<p class="rcempty">Rien de prévu aujourd'hui. Planifie dans l'agenda.</p>`;
    today=`<div class="seclabel"><span class="t">À faire aujourd'hui</span>
        <button class="lk" onclick="goPage('session')">Agenda</button></div>
      <div class="panel todaytasks">${late}${rows}</div>`;
  }

  // — À bosser —
  let bosser='';
  const bos=aBosser();
  if(bos.length){
    const rows=bos.map(b=>{ const col=couleur(b.pct);
      return `<div class="prevrow bosser">
        <button class="bosswork" onclick="workSubject(${b.mi})" aria-label="Bosser ${escapeH(b.txt)}">
          <span class="pdot" style="background:${b.color}"></span>

          <span class="ppct" style="color:${col}">${b.pct}%</span></button>
        <button class="bossgraph" onclick="openMatiere(${b.mi})" title="Voir le graphe" aria-label="Voir le graphe de ${escapeH(b.txt)}">${ic('bars',18)}</button>
      </div>`;
    }).join('');
    bosser=`<div class="seclabel"><span class="t">À bosser</span></div><div class="prevlist">${rows}</div>`;
  }

  // — Recap du jour —
  const rc=recapToday();
  const hasRecap=rc.work>0 || rc.changed.length || rc.done.length;
  let recap=`<div class="seclabel"><span class="t">Aujourd'hui</span></div><div class="panel recap">`;
  if(!hasRecap){
    recap+=`<p class="rcempty">Rien encore aujourd'hui — lance une session pour remplir ton bilan.</p>`;
  } else {
    if(rc.work>0){
      const chips=Object.entries(rc.perMat).map(([mid,ms])=>{ const m=data.matieres.find(x=>x.id===mid);
        return `<span class="rchip"><span class="cdot" style="background:${m?m.color:'#888'}"></span>${m?escapeH(m.nom):'?'} · ${fmtDur(ms)}</span>`; }).join('');
      recap+=`<div class="rcline">${ic('clock',16)}<span><b>${fmtDur(rc.work)}</b> travaillées aujourd'hui</span></div>`;
      if(chips) recap+=`<div class="rchips">${chips}</div>`;
    }
    rc.changed.slice(0,4).forEach(c=>{ const up=c.to>=c.from;
      recap+=`<div class="rcline"><span class="cdot" style="background:${c.color}"></span><span>${escapeH(c.nom)} : ${c.from}% → <b style="color:${couleur(c.to)}">${c.to}%</b> ${up?'↗':'↘'}</span></div>`; });
    if(rc.changed.length>4) recap+=`<div class="rcline"><span style="width:9px"></span><span class="rcmore">+ ${rc.changed.length-4} autre${rc.changed.length-4>1?'s':''} chapitre${rc.changed.length-4>1?'s':''}</span></div>`;

  }
  recap+=`</div>`;

  // — Tes matières —
  let subjects;
  if(!data.matieres.length){

      <span class="bookic">${ic('book',38)}</span>
      <h2>Aucune matière</h2>
      <p>Ajoute tes matières pour suivre ta progression et chronométrer tes révisions.</p>
      <button class="cta" onclick="goPage('matieres')">${ic('plus',20)}<span>Ajouter une matière</span></button></div>`;
  } else {
    const rows=data.matieres.map((m,i)=>{ const mo=moyenne(m.chapitres), col=couleur(mo);
      return `<button class="prevrow" onclick="openMatiere(${i})">
        <span class="pdot" style="background:${m.color}"></span>

    }).join('');
    subjects=`<div class="seclabel"><span class="t">Tes matières</span>
        <button class="lk" onclick="goPage('matieres')">Tout voir</button></div>
      <div class="prevlist">${rows}</div>`;
  }

  // — Aperçu (compteurs) —
  const nm=data.matieres.length, nc=data.matieres.reduce((s,m)=>s+m.chapitres.length,0), ns=(data.sessions||[]).length;
  const apercu=`<div class="seclabel"><span class="t">Aperçu</span></div>
    <div class="counts">

      <div class="countcard"><div class="n">${nc}</div><div class="l">Chapitre${nc>1?'s':''}</div></div>
      <div class="countcard"><div class="n">${ns}</div><div class="l">Session${ns>1?'s':''}</div></div>
    </div>`;

  a.innerHTML = hello + streak + stats + cta + today + bosser + recap + subjects + apercu;

// Anime un nombre de 0 jusqu'à sa valeur (ease-out cubique). Respecte « réduire les animations ».
function prefersReduced(){ try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } }
function countUp(el){
  const to=+el.dataset.to||0;
  if(prefersReduced()||to===0){ el.textContent=to; return; }
  const dur=450; let start=null;
  el.textContent='0';
  requestAnimationFrame(function step(ts){
    if(start===null) start=ts;
    const k=Math.min(1,(ts-start)/dur), e=1-Math.pow(1-k,3);
    el.textContent=Math.round(to*e);
    if(k<1) requestAnimationFrame(step);
  });
}

// ---------- Graphes : temps (x) × % de maîtrise (y) ----------
// Domaine de temps commun à tous les graphes d'une matière. Le 1er point se cale à
// GAUCHE (= début du suivi) et la courbe se remplit vers la droite avec le temps.
function chartDomain(m){
  let tmin=Infinity,tmax=-Infinity;
  m.chapitres.forEach(c=>(c.hist||[]).forEach(pt=>{const t=new Date(pt.t).getTime(); if(t<tmin)tmin=t; if(t>tmax)tmax=t;}));
  const now=Date.now();
  chartReal = isFinite(tmin) ? [tmin,tmax] : [now,now];   // vraie plage avant rembourrage
  if(!isFinite(tmin)){ tmin=now; tmax=now; }
  if(now>tmax) tmax=now;
  if(tmax-tmin<86400000) tmax=tmin+86400000;   // 1 seul jour → rembourrage à DROITE (point à gauche)
  return [tmin,tmax];
}
// Série de la maîtrise MOYENNE de la matière dans le temps (valeur reportée jour par jour).
function avgSeries(m){
  // On trie chaque chapitre UNE seule fois (avant : un re-tri par jour → lent pendant le glissement).
  const chs=m.chapitres.map(c=>(c.hist||[]).slice().sort((a,b)=>new Date(a.t)-new Date(b.t)));
  const days=[...new Set(chs.flat().map(pt=>pt.t.slice(0,10)))].sort();
  return days.map(day=>{
    let sum=0,n=0;
    chs.forEach(pts=>{
      let v=null;
      for(let i=0;i<pts.length && pts[i].t.slice(0,10)<=day;i++) v=pts[i].p;   // dernier point ≤ ce jour
      if(v!==null){ sum+=v; n++; }
    });
    return {t:day+'T12:00:00.000Z', p:n?Math.round(sum/n):0};
  });
}
// Trace la courbe : fond neutre (pas de bandes colorées), mais la LIGNE change de couleur
// en traversant les paliers de maîtrise (rouge→orange→jaune→vert) pour visualiser la progression.
function lineChart(points, color, o){
  o=o||{};
  const [tmin,tmax]=chartDom, W=o.w, H=o.h, labels=!!o.labels;
  const padL=labels?28:6, padR=8, padT=8, padB=labels?22:6, plotW=W-padL-padR, plotH=H-padT-padB;
  const X=t=>padL+(tmax>tmin?(t-tmin)/(tmax-tmin):0)*plotW;
  const Y=p=>padT+(100-p)/100*plotH;
  let grid='';
  [0,50,100].forEach(p=>{ const y=Y(p).toFixed(1);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" class="cg"${p===50?' opacity="0.5"':''}/>`;
    if(labels) grid+=`<text x="${padL-5}" y="${(+y+3).toFixed(1)}" class="cyl">${p}</text>`;
  });
  let xl='';
  if(labels){
    const [rmin,rmax]=chartReal;
    if(rmax-rmin < 86400000){            // un seul jour de données → une étiquette calée à gauche
      const today=new Date().toDateString()===new Date(rmax).toDateString();
      const lab=today?"aujourd'hui":fmtDate(new Date(rmax).toISOString());
      xl=`<text x="${padL}" y="${H-7}" class="cxl" style="text-anchor:start">${lab}</text>`;
    } else {                             // plusieurs jours → graduations sans doublon
      const longSpan=(tmax-tmin)/86400000>182 || new Date(tmin).getFullYear()!==new Date(tmax).getFullYear();
      const fmtX=t=>longSpan ? new Date(t).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}) : fmtDate(new Date(t).toISOString());
      const nT=4; let prev=null;
      for(let i=0;i<=nT;i++){ const t=tmin+(tmax-tmin)*i/nT, lab=fmtX(t);
        if(lab!==prev){ const anc=i===0?'start':i===nT?'end':'middle';
          xl+=`<text x="${X(t).toFixed(1)}" y="${H-7}" class="cxl" style="text-anchor:${anc}">${lab}</text>`; prev=lab; }
      }
    }
  }
  const pts=(points||[]).slice().sort((a,b)=>new Date(a.t)-new Date(b.t));
  let path='';
  if(pts.length){
    const xy=pts.map(pt=>({x:X(new Date(pt.t).getTime()), p:pt.p}));
    const sw=labels?2.6:2.2;
    // la ligne est découpée aux seuils 20/40/60 : chaque morceau prend la couleur de son palier
    let segs='';
    for(let i=0;i+1<xy.length;i++){
      const a=xy[i], b=xy[i+1];
      const cuts=[0,1];
      [20,40,60].forEach(bd=>{ if((a.p-bd)*(b.p-bd)<0) cuts.push((bd-a.p)/(b.p-a.p)); });
      cuts.sort((u,v)=>u-v);
      for(let k=0;k+1<cuts.length;k++){
        const f0=cuts[k], f1=cuts[k+1];
        const p0=a.p+(b.p-a.p)*f0, p1=a.p+(b.p-a.p)*f1;
        const x0=a.x+(b.x-a.x)*f0, x1=a.x+(b.x-a.x)*f1;
        segs+=`<path d="M${x0.toFixed(1)} ${Y(p0).toFixed(1)} L${x1.toFixed(1)} ${Y(p1).toFixed(1)}" fill="none" stroke="${couleur((p0+p1)/2)}" stroke-width="${sw}" stroke-linecap="round"/>`;
      }
    }
    const dots=xy.map((q,i)=>`<circle cx="${q.x.toFixed(1)}" cy="${Y(q.p).toFixed(1)}" r="${labels?3:2.4}" fill="${couleur(q.p)}"><title>${fmtDate(new Date(pts[i].t).toISOString())} · ${pts[i].p} %</title></circle>`).join('');
    const last=xy[xy.length-1];
    const lastDot=`<circle cx="${last.x.toFixed(1)}" cy="${Y(last.p).toFixed(1)}" r="${labels?4:3}" fill="${couleur(last.p)}" stroke="var(--card)" stroke-width="2"/>`;
    path=segs+dots+lastDot;
  }
  return `<svg viewBox="0 0 ${W} ${H}" class="chartsvg">${grid}${xl}${path}</svg>`;
}
