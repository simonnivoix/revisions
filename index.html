<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Mes révisions</title>
<!-- iPad : permet « Sur l'écran d'accueil » → app plein écran -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Révisions">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EAF0F6">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230369A1'/%3E%3Ctext x='90' y='128' font-size='104' text-anchor='middle'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
<style>
  /* Palette neutre « slate » : fond neutre clair, un seul accent bleu.
     Règle 60-30-10 — les couleurs rouge/orange/jaune/vert ne servent QUE l'indicateur
     de maîtrise (barres, %, courbe), jamais la décoration ou la navigation. */
  :root{
    --bg:#EAF0F6;          /* 60% fond (bleu-gris frais, fait ressortir les cartes) */
    --bg2:#D8E2EC;         /* pistes de barres / sliders */
    --card:#FFFFFF;        /* 30% surfaces */
    --ink:#0F172A;         /* texte principal */
    --muted:#5C6B7A;       /* texte secondaire / labels */
    --line:#D8E2EC;        /* bordures fines */
    --primary:#0369A1;     /* 10% accent : liens, focus, CTA */
    --rouge:#DC2626; --orange:#F97316; --jaune:#EAB308; --vert:#16A34A;
    --shadow:0 1px 3px rgba(15,23,42,.08);
    --ring:rgba(3,105,161,.16);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);min-height:100vh;
       transition:background-color .3s ease,color .3s ease}
  .wrap{max-width:920px;margin:0 auto;padding:30px 22px 60px}
  .ic{display:inline-block;vertical-align:middle;flex-shrink:0}

  /* ---------- En-tête ---------- */
  header{margin-bottom:22px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
  .tagline{color:var(--muted);font-size:13px;margin-top:4px;display:flex;align-items:center;gap:6px}
  .gpill{font-weight:700}
  .iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;
           justify-content:center;min-width:44px;min-height:44px;border-radius:10px;padding:0;transition:.15s}
  .iconbtn:hover{color:var(--primary);background:var(--bg2)}
  .iconbtn:active{transform:scale(.94)}

  /* ---------- Vue accueil : grille de matières ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;color:var(--ink);
         box-shadow:var(--shadow);position:relative;text-align:left;
         transition:transform .2s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease,background-color .3s ease,border-color .3s ease,color .3s ease;
         animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards}
  .mcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.10)}
  .mcard:active{transform:translateY(-1px) scale(.992)}
  .mcard.done{border-color:var(--vert)}
  .mcard.done .go{color:var(--vert)}
  .mcard .name{font-size:15px;font-weight:500;margin-bottom:12px;padding-right:26px;line-height:1.3}
  .mcard .pct{font-size:34px;font-weight:700;line-height:1;letter-spacing:-.02em}
  .mcard .pct .u{font-size:16px;font-weight:500;color:var(--muted);margin-left:1px}
  .mcard .pbar{height:8px;border-radius:5px;background:var(--bg2);margin:12px 0 8px;overflow:hidden}
  .mcard .pbar>span{display:block;height:100%;border-radius:5px;transition:width .55s cubic-bezier(.22,.61,.36,1),background .3s}
  .mcard .meta{font-size:12px;font-weight:500;color:var(--muted)}
  .mcard .go{position:absolute;top:15px;right:13px;color:var(--muted);display:inline-flex}
  .addcard{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line);
           background:transparent;box-shadow:none;color:var(--muted);font-size:14px;font-weight:600;min-height:140px}
  .addcard:hover{border-color:var(--primary);color:var(--primary);transform:none;box-shadow:none}

  /* ---------- État vide ---------- */
  .empty{max-width:380px;margin:46px auto;text-align:center;color:var(--ink);animation:rise .4s ease backwards}
  .bookic{color:var(--muted);display:inline-flex}
  .empty h2{font-size:18px;font-weight:600;margin:10px 0 8px}
  .empty p{font-size:14px;line-height:1.5;color:var(--muted);margin:0 0 22px}
  .cta{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:none;
       font-size:16px;font-weight:600;padding:12px 22px;border-radius:12px;cursor:pointer;font-family:inherit;transition:.15s}
  .cta:hover{filter:brightness(1.07)}
  .cta:active{transform:scale(.97)}

  /* ---------- Vue détail matière ---------- */
  .back{background:none;border:none;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;
        padding:6px 0;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .back:hover{opacity:.78}
  .back:active{transform:scale(.97)}
  .dhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .dhead h2{margin:0;font-size:22px;font-weight:600;flex:1;line-height:1.2}
  .badge{font-weight:700;font-size:15px;color:#fff;padding:4px 12px;border-radius:999px}
  .dsub{color:var(--muted);font-size:12px;margin:0 0 18px}

  .chap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:9px;
        box-shadow:var(--shadow);animation:rise .4s cubic-bezier(.22,.61,.36,1) backwards;
        transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease,background-color .3s ease,border-color .3s ease,color .3s ease}
  .chap:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,23,42,.08)}
  .chap.done{border-color:var(--vert)}
  .chap .top{display:flex;align-items:center;gap:8px}
  .chap .cname{font-size:15px;font-weight:500;flex:1;line-height:1.3}
  .chap .cdone{color:var(--vert);display:inline-flex}
  .chap .cpct{font-size:15px;font-weight:700;min-width:42px;text-align:right}
  .chap .bar{height:8px;border-radius:5px;background:var(--bg2);overflow:hidden;margin:10px 0 0}
  .chap .bar>span{display:block;height:100%;border-radius:5px;transition:width .5s cubic-bezier(.22,.61,.36,1),background .3s}
  .chap .ctrl{display:flex;align-items:center;gap:10px;margin-top:11px}

  /* Curseur gris neutre, rendu identique sur tous les navigateurs (pas de remplissage coloré). */
  .chap input[type=range]{-webkit-appearance:none;appearance:none;flex:1;min-width:120px;
        height:32px;background:transparent;cursor:pointer;margin:0}
  .chap input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-moz-range-track{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-moz-range-progress{height:6px;border-radius:5px;background:var(--bg2)}
  .chap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
        border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22);margin-top:-8px;
        transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .chap input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
        background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.22);
        transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .chap input[type=range]:active::-webkit-slider-thumb,.chap input[type=range]:focus-visible::-webkit-slider-thumb{
        transform:scale(1.2);border-color:var(--primary);box-shadow:0 0 0 7px var(--ring),0 1px 4px rgba(0,0,0,.28)}
  .chap input[type=range]:active::-moz-range-thumb,.chap input[type=range]:focus-visible::-moz-range-thumb{
        transform:scale(1.2);border-color:var(--primary);box-shadow:0 0 0 7px var(--ring),0 1px 4px rgba(0,0,0,.28)}

  .seegraph{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--line);color:var(--muted);
            border-radius:9px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
            white-space:nowrap;transition:.15s;min-height:40px}
  .seegraph:hover{border-color:var(--primary);color:var(--primary)}
  .seegraph.on{border-color:var(--primary);color:var(--primary)}
  .seegraph:active{transform:scale(.96)}
  .delc{background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;
        justify-content:center;min-width:44px;min-height:44px;border-radius:10px;padding:0;transition:.15s}
  .delc:hover{color:var(--rouge)}
  .delc:active{transform:scale(.94)}
  .chap .delc{opacity:.55;min-width:40px;min-height:40px}
  .chap .delc:hover{opacity:1}
  .dtrash{color:var(--muted)}

  /* ---------- Graphe d'évolution de la maîtrise ---------- */
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
            margin-bottom:18px;box-shadow:var(--shadow)}
  .chartbox h3{margin:0 0 10px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .chartsvg{width:100%;height:auto;display:block;font-family:inherit}
  .chartsvg .cg{stroke:var(--line);stroke-width:1}
  .chartsvg .cyl{fill:var(--muted);font-size:11px;text-anchor:end}
  .chartsvg .cxl{fill:var(--muted);font-size:11px;text-anchor:middle}
  .chartempty{color:var(--muted);font-size:13px;margin:6px 0 2px}
  .minichart{display:none;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
  .minichart.open{display:block}
  .minichart .chartsvg{width:100%;height:auto;display:block}
  .chartsvg circle{cursor:pointer}
  .cname,.dhead h2{cursor:text}

  .add-row{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px dashed var(--line);
           border-radius:12px;padding:0 14px;margin-bottom:14px;color:var(--muted);transition:.15s}
  .add-row:focus-within{border-color:var(--primary);color:var(--primary)}
  .addchap{flex:1;background:none;border:none;padding:15px 0;font-size:16px;color:var(--ink);font-family:inherit}
  .addchap::placeholder{color:var(--muted)}
  .addchap:focus{outline:none}

  /* ---------- Menu réglages (overlay) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;
           padding:56px 16px;z-index:50;animation:fade .2s ease}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:360px;
         box-shadow:0 14px 44px rgba(15,23,42,.28);animation:rise .25s cubic-bezier(.22,.61,.36,1)}
  .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .phead>span{font-size:16px;font-weight:600}
  .plabel{font-size:11px;font-weight:600;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.05em}
  .topt{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1px solid transparent;border-radius:10px;
        padding:9px 10px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink);min-height:44px;transition:.12s;margin-bottom:2px}
  .topt:hover{background:var(--bg2)}
  .topt.on{border-color:var(--primary)}
  .tdot{width:18px;height:18px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);flex-shrink:0}
  .tlabel{flex:1;text-align:left}
  .tcheck{color:var(--primary);display:none}
  .topt.on .tcheck{display:inline-flex}
  .dbtn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1px solid var(--line);border-radius:10px;
        padding:0 14px;min-height:46px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
        margin-bottom:8px;transition:.12s}
  .dbtn:hover{border-color:var(--primary);color:var(--primary)}
  .dbtn:active{transform:scale(.98)}
  .dbtn.danger{color:var(--rouge)}
  .dbtn.danger:hover{border-color:var(--rouge);color:var(--rouge)}
  .pfoot{font-size:12px;color:var(--muted);margin:14px 0 0;text-align:center}

  /* ---------- Tactile (iPad / iPhone) ---------- */
  button,input,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .cname,.dhead h2{touch-action:manipulation;-webkit-user-select:none;user-select:none}
  @media (hover:none){
    .mcard:hover,.chap:hover{transform:none}
    .mcard:hover{box-shadow:var(--shadow)}
  }

  .hidden{display:none}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  button:focus-visible,input:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;animation-delay:0!important;transition-duration:.001ms!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hrow">
      <div>
        <h1>Mes révisions</h1>
        <div class="tagline" id="tagline">Maîtrise globale <span class="gpill" id="globalPill"></span></div>
      </div>
      <button class="iconbtn" id="settingsBtn" title="Réglages" onclick="openSettings()"></button>
    </div>
  </header>

  <!-- ACCUEIL -->
  <div id="home" class="fade"></div>

  <!-- DÉTAIL -->
  <div id="detail" class="hidden"></div>
</div>

<!-- RÉGLAGES -->
<div id="settings" class="overlay hidden" onclick="if(event.target===this)closeSettings()">
  <div class="panel">
    <div class="phead"><span>Réglages</span><button class="iconbtn" id="closeSettingsBtn" title="Fermer" onclick="closeSettings()"></button></div>
    <p class="plabel">Apparence</p>
    <div id="themeOpts"></div>
    <p class="plabel" style="margin-top:18px">Mes données</p>
    <button class="dbtn" id="btnExport" onclick="exportData()"></button>
    <button class="dbtn" id="btnImport" onclick="document.getElementById('importFile').click()"></button>
    <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importData(event)">
    <button class="dbtn danger" id="btnReset" onclick="resetData()"></button>
    <p class="pfoot">Tout est enregistré sur cet appareil, sans internet.</p>
  </div>
</div>

<script>
const VERSION = '20260615-180934';   // tampon de publication (remplacé par deploy.sh) — sert à la mise à jour auto
const STORE_KEY = "suivi-revisions-bac";
const THEME_KEY = "suivi-revisions-bac-theme";

// ---- Icônes (SVG inline, cohérentes : trait 1.5, currentColor) ----
const ICONS = {
  'chevron':'<path d="M9 6l6 6-6 6"/>',
  'back':'<path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>',
  'trash':'<path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>',
  'x':'<path d="M18 6L6 18M6 6l12 12"/>',
  'chart':'<path d="M4 4v16h16"/><path d="M7 14l3-3 3 2 4-5"/>',
  'download':'<path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/>',
  'upload':'<path d="M5 21h14"/><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/>',
  'reset':'<path d="M3 12a9 9 0 109-9 9 9 0 00-6.36 2.64L3 8"/><path d="M3 3v5h5"/>',
  'settings':'<path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/>',
  'plus':'<path d="M12 5v14M5 12h14"/>',
  'check':'<path d="M5 13l4 4 8-10"/>',
  'book':'<path d="M12 6.5C10.5 5 8 4.5 4 4.5v13c4 0 6.5.5 8 2 1.5-1.5 4-2 8-2v-13c-4 0-6.5.5-8 2z"/><path d="M12 6.5V20"/>',
};
function ic(name,size){ size=size||20; return `<svg class="ic" viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name]||''}</svg>`; }

// ---- Ambiances : clair (slate) par défaut, + sauge (chaud) + sombre (zinc) ----
const THEMES = {
  slate: {label:"Clair",  vars:{}},
  sauge: {label:"Sauge",  vars:{'--bg':'#E7EEE0','--bg2':'#D3DEC6','--card':'#FBFCF9','--ink':'#20271C',
                                '--muted':'#67735C','--line':'#D3DEC6','--primary':'#4F7A52',
                                '--shadow':'0 1px 3px rgba(32,39,28,.09)','--ring':'rgba(79,122,82,.18)'}},
  sombre:{label:"Sombre", vars:{'--bg':'#09090B','--bg2':'#27272A','--card':'#18181B','--ink':'#FAFAFA',
                                '--muted':'#A1A1AA','--line':'#3F3F46','--primary':'#38BDF8',
                                '--rouge':'#F87171','--orange':'#FB923C','--jaune':'#FACC15','--vert':'#34D399',
                                '--shadow':'0 1px 3px rgba(0,0,0,.4)','--ring':'rgba(56,189,248,.20)'}},
};
// Base claire complète : permet de revenir proprement après le mode sombre (couleurs maîtrise incluses).
const LIGHT_DEFAULTS = {
  '--bg':'#EAF0F6','--bg2':'#D8E2EC','--card':'#FFFFFF','--ink':'#0F172A','--muted':'#5C6B7A','--line':'#D8E2EC',
  '--primary':'#0369A1','--rouge':'#DC2626','--orange':'#F97316','--jaune':'#EAB308','--vert':'#16A34A',
  '--shadow':'0 1px 3px rgba(15,23,42,.08)','--ring':'rgba(3,105,161,.16)'
};

function applyTheme(name){
  if(!THEMES[name]) name='slate';
  const t = THEMES[name];
  const root = document.documentElement;
  Object.entries(LIGHT_DEFAULTS).forEach(([k,v])=>root.style.setProperty(k,v)); // base claire
  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));          // puis l'ambiance
  localStorage.setItem(THEME_KEY, name);
  document.querySelectorAll('.topt').forEach(s=>s.classList.toggle('on', s.dataset.t===name));
}
function buildThemeOpts(active){
  const box = document.getElementById('themeOpts');
  box.innerHTML = Object.entries(THEMES).map(([k,t])=>{
    const bg = t.vars['--bg']||LIGHT_DEFAULTS['--bg'];
    const ac = t.vars['--primary']||LIGHT_DEFAULTS['--primary'];
    return `<button class="topt${k===active?' on':''}" data-t="${k}" onclick="applyTheme('${k}')">
      <span class="tdot" style="background:linear-gradient(135deg,${bg},${ac})"></span>
      <span class="tlabel">${t.label}</span>
      <span class="tcheck">${ic('check',18)}</span>
    </button>`;
  }).join('');
}
function openSettings(){ buildThemeOpts(localStorage.getItem(THEME_KEY)||'slate'); document.getElementById('settings').classList.remove('hidden'); }
function closeSettings(){ document.getElementById('settings').classList.add('hidden'); }

const DEFAULT = { matieres:[] };  // démarre vide (matières du bac à ajouter)

let data = load();
let current = null;       // index matière ouverte, ou null = accueil
let chartDom = [0,1];     // [tmin,tmax] (rembourré) partagé par les graphes de la matière ouverte
let chartReal = [0,0];    // vraie plage [min,max] des points, avant rembourrage

function load(){ try{const r=localStorage.getItem(STORE_KEY); if(r) return backfillDaily(prepare(JSON.parse(r)));}catch(e){} return prepare(clone(DEFAULT)); }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
// Garantit que chaque chapitre a un historique de points {t,p} ; nettoie l'ancien champ "last".
function prepare(d){
  (d.matieres||[]).forEach(m=>(m.chapitres||[]).forEach(c=>{
    if(!Array.isArray(c.hist)) c.hist=[{t:new Date().toISOString(), p:+c.pct||0}];
    delete c.last;
  }));
  return d;
}
// La courbe se construit toute seule dans le temps : pour chaque chapitre, on ajoute
// un point par jour (à la dernière valeur connue) entre le dernier point enregistré et
// aujourd'hui. Idempotent. Lancé à chaque chargement/import.
function backfillDaily(d){
  const todayMs=Date.parse(new Date().toISOString().slice(0,10)+'T12:00:00.000Z');
  (d.matieres||[]).forEach(m=>(m.chapitres||[]).forEach(c=>{
    if(!Array.isArray(c.hist)||!c.hist.length) return;
    c.hist.sort((a,b)=>new Date(a.t)-new Date(b.t));
    const last=c.hist[c.hist.length-1];
    let dayMs=Date.parse(last.t.slice(0,10)+'T12:00:00.000Z');
    while(dayMs+86400000<=todayMs){
      dayMs+=86400000;
      c.hist.push({t:new Date(dayMs).toISOString().slice(0,10)+'T12:00:00.000Z', p:last.p});
    }
  }));
  return d;
}

function couleur(p){ if(p<=20)return getCSS('--rouge'); if(p<=40)return getCSS('--orange'); if(p<=60)return getCSS('--jaune'); return getCSS('--vert'); }
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function moyenne(ch){ return ch.length?Math.round(ch.reduce((s,c)=>s+(+c.pct||0),0)/ch.length):0; }
function fmtDate(iso){ return iso?new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):''; }
function escapeH(s){ return (s+'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ---------- Rendu ----------
function render(){
  updateGlobal();
  if(current===null){ renderHome(); } else { renderDetail(); }
  save();
}
// Maîtrise globale en sous-titre (cachée tant qu'il n'y a aucun chapitre).
function updateGlobal(){
  const all = data.matieres.flatMap(m=>m.chapitres);
  const tag = document.getElementById('tagline');
  if(!all.length){ tag.style.display='none'; return; }
  tag.style.display='';
  const moy=moyenne(all);
  const el=document.getElementById('globalPill');
  el.textContent=moy+'%'; el.style.color=couleur(moy);
}

function renderHome(){
  document.getElementById('detail').classList.add('hidden');
  const home = document.getElementById('home');
  home.classList.remove('hidden'); home.classList.remove('fade'); void home.offsetWidth; home.classList.add('fade');
  if(!data.matieres.length){ home.innerHTML = emptyState(); return; }
  home.innerHTML = `<div class="grid">` + data.matieres.map((m,i)=>{
    const moy = moyenne(m.chapitres);
    const col = couleur(moy);
    const done = moy>=100;
    return `<button class="mcard${done?' done':''}" style="animation-delay:${Math.min(i,8)*45}ms" onclick="open_(${i})">
      <span class="go">${done?ic('check',20):ic('chevron',20)}</span>
      <div class="name">${escapeH(m.nom)}</div>
      <div class="pct" style="color:${col}"><span class="num" data-to="${moy}">${moy}</span><span class="u">%</span></div>
      <div class="pbar"><span style="width:${moy}%;background:${col}"></span></div>
      <div class="meta">${m.chapitres.length} chapitre${m.chapitres.length>1?'s':''}</div>
    </button>`;
  }).join('') + `<button class="mcard addcard" style="animation-delay:${Math.min(data.matieres.length,8)*45}ms" onclick="addMatiere()">${ic('plus',20)}<span>Ajouter une matière</span></button></div>`;
  home.querySelectorAll('.mcard .num').forEach(countUp);   // grand % qui s'incrémente de 0
}
function emptyState(){
  return `<div class="empty">
    <span class="bookic">${ic('book',40)}</span>
    <h2>Prêt·e à réviser ?</h2>
    <p>Ajoute tes matières une par une. Pour chacune, note tes chapitres et fais glisser le curseur selon ce que tu maîtrises. Ta progression se trace toute seule, jour après jour.</p>
    <button class="cta" onclick="addMatiere()">${ic('plus',20)}<span>Ajouter ma première matière</span></button>
  </div>`;
}
// Anime un nombre de 0 jusqu'à sa valeur (ease-out cubique). Respecte « réduire les animations ».
function prefersReduced(){ try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } }
function countUp(el){
  const to=+el.dataset.to||0;
  if(prefersReduced()||to===0){ el.textContent=to; return; }
  const dur=450; let start=null;
  el.textContent='0';
  requestAnimationFrame(function step(ts){
    if(start===null) start=ts;
    const k=Math.min(1,(ts-start)/dur), e=1-Math.pow(1-k,3);
    el.textContent=Math.round(to*e);
    if(k<1) requestAnimationFrame(step);
  });
}

function renderDetail(){
  document.getElementById('home').classList.add('hidden');
  const d = document.getElementById('detail');
  d.classList.remove('hidden'); d.classList.remove('fade'); void d.offsetWidth; d.classList.add('fade');
  const m = data.matieres[current];
  const moy = moyenne(m.chapitres);
  chartDom = chartDomain(m);   // échelle de temps partagée par tous les graphes de la matière
  // chapitres triés du % le plus faible au plus élevé (les moins maîtrisés en haut)
  const order = m.chapitres.map((c,ci)=>({c,ci})).sort((a,b)=>a.c.pct-b.c.pct);
  d.innerHTML = `
    <button class="back" onclick="goHome()">${ic('back',18)}<span>Toutes les matières</span></button>
    <div class="dhead">
      <h2 ondblclick="renameMat()" title="Double-clic pour renommer">${escapeH(m.nom)}</h2>
      <span class="badge" style="background:${couleur(moy)}">${moy}%</span>
      <button class="delc dtrash" title="Supprimer la matière" onclick="delMatiere(${current})">${ic('trash',20)}</button>
    </div>
    <p class="dsub" id="dsub">${subText(m)}</p>
    <div class="chartbox">
      <h3>Évolution</h3>
      <div id="chart">${avgChartSVG(m)}</div>
    </div>
    <div class="add-row">${ic('plus',18)}<input class="addchap" type="text" placeholder="Ajouter un chapitre"
           onkeydown="if(event.key==='Enter'){addChapitre(${current},this.value);this.value=''}"></div>
    ${order.map(({c,ci},pos)=>chapCard(ci,c,pos)).join('')}
  `;
}

function chapCard(ci,c,pos){
  const col = couleur(c.pct);
  const done = c.pct>=100;
  return `<div class="chap${done?' done':''}" data-ci="${ci}" style="animation-delay:${Math.min(pos||0,8)*40}ms">
    <div class="top">
      <span class="cname" ondblclick="renameChap(${ci})" title="Double-clic pour renommer">${escapeH(c.nom)}</span>
      ${done?`<span class="cdone">${ic('check',16)}</span>`:''}
      <span class="cpct" style="color:${col}">${c.pct}%</span>
    </div>
    <div class="bar"><span style="width:${c.pct}%;background:${col}"></span></div>
    <div class="ctrl">
      <input type="range" min="0" max="100" step="5" value="${c.pct}"
             oninput="setPct(${ci},this.value)" onchange="commitPct(${ci},this.value)">
      <button class="seegraph" onclick="toggleChap(${ci})">${ic('chart',18)}<span>Graphe</span></button>
      <button class="delc" title="Supprimer" onclick="delChapitre(${ci})">${ic('x',18)}</button>
    </div>
    <div class="minichart" id="mc-${ci}">${lineChart(c.hist, col, {w:480,h:165,labels:true})}</div>
  </div>`;
}

// ---------- Navigation ----------
function open_(i){ current=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function goHome(){ current=null; render(); window.scrollTo({top:0}); }

// ---------- Actions ----------
// Enregistre la valeur du jour (un seul point par jour, écrasé si on rebouge le même jour).
function recordToday(c,v){
  const h=c.hist||(c.hist=[]);
  const today=new Date().toISOString();
  if(h.length && h[h.length-1].t.slice(0,10)===today.slice(0,10)) h[h.length-1].p=v;
  else h.push({t:today,p:v});
}
// Redessine les graphes EN PLACE (graphe du haut + mini-graphe du chapitre). On ne
// touche QUE des conteneurs SVG (#chart, #mc-ci) qui ne contiennent pas le curseur.
function redrawCharts(ci){
  const c=data.matieres[current].chapitres[ci];
  const mc=document.getElementById('mc-'+ci);
  if(mc) mc.innerHTML=lineChart(c.hist, couleur(c.pct), {w:480,h:165,labels:true});
  renderChartAvg();
}
// Pendant le glissement (oninput) : patch DOM en place (pas de re-render qui casserait le
// curseur, pas de re-tri qui ferait sauter les lignes) ET graphes mis à jour EN TEMPS RÉEL.
function setPct(ci,v){
  v=+v;
  const c=data.matieres[current].chapitres[ci];
  c.pct=v;
  const col=couleur(v);
  const card=document.querySelector(`#detail .chap[data-ci="${ci}"]`);
  if(card){
    const p=card.querySelector('.cpct'); p.textContent=v+'%'; p.style.color=col;
    const bar=card.querySelector('.bar>span'); bar.style.width=v+'%'; bar.style.background=col;
  }
  recordToday(c,v);
  redrawCharts(ci);
  refreshBadge(); save();
}
// Au relâchement (onchange) : finalise le point du jour, redessine, marque l'état 100%. Pas de re-tri.
function commitPct(ci,v){
  v=+v;
  const c=data.matieres[current].chapitres[ci];
  c.pct=v;
  recordToday(c,v);
  redrawCharts(ci);
  const card=document.querySelector(`#detail .chap[data-ci="${ci}"]`);
  if(card) card.classList.toggle('done', v>=100);
  save();
}
function subText(m){ return `Maîtrise moyenne sur ${m.chapitres.length} chapitre${m.chapitres.length>1?'s':''}.`; }

// ---------- Graphes : temps (x) × % de maîtrise (y) ----------
// Domaine de temps commun à tous les graphes d'une matière. Le 1er point se cale à
// GAUCHE (= début du suivi) et la courbe se remplit vers la droite avec le temps.
function chartDomain(m){
  let tmin=Infinity,tmax=-Infinity;
  m.chapitres.forEach(c=>(c.hist||[]).forEach(pt=>{const t=new Date(pt.t).getTime(); if(t<tmin)tmin=t; if(t>tmax)tmax=t;}));
  const now=Date.now();
  chartReal = isFinite(tmin) ? [tmin,tmax] : [now,now];   // vraie plage avant rembourrage
  if(!isFinite(tmin)){ tmin=now; tmax=now; }
  if(now>tmax) tmax=now;
  if(tmax-tmin<86400000) tmax=tmin+86400000;   // 1 seul jour → rembourrage à DROITE (point à gauche)
  return [tmin,tmax];
}
// Série de la maîtrise MOYENNE de la matière dans le temps (valeur reportée jour par jour).
function avgSeries(m){
  const days=[...new Set(m.chapitres.flatMap(c=>(c.hist||[]).map(pt=>pt.t.slice(0,10))))].sort();
  return days.map(day=>{
    let sum=0,n=0;
    m.chapitres.forEach(c=>{
      const pts=(c.hist||[]).slice().sort((a,b)=>new Date(a.t)-new Date(b.t)).filter(pt=>pt.t.slice(0,10)<=day);
      if(pts.length){ sum+=pts[pts.length-1].p; n++; }
    });
    return {t:day+'T12:00:00.000Z', p:n?Math.round(sum/n):0};
  });
}
// Trace la courbe : fond neutre (pas de bandes colorées), mais la LIGNE change de couleur
// en traversant les paliers de maîtrise (rouge→orange→jaune→vert) pour visualiser la progression.
function lineChart(points, color, o){
  o=o||{};
  const [tmin,tmax]=chartDom, W=o.w, H=o.h, labels=!!o.labels;
  const padL=labels?28:6, padR=8, padT=8, padB=labels?22:6, plotW=W-padL-padR, plotH=H-padT-padB;
  const X=t=>padL+(tmax>tmin?(t-tmin)/(tmax-tmin):0)*plotW;
  const Y=p=>padT+(100-p)/100*plotH;
  let grid='';
  [0,50,100].forEach(p=>{ const y=Y(p).toFixed(1);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" class="cg"${p===50?' opacity="0.5"':''}/>`;
    if(labels) grid+=`<text x="${padL-5}" y="${(+y+3).toFixed(1)}" class="cyl">${p}</text>`;
  });
  let xl='';
  if(labels){
    const [rmin,rmax]=chartReal;
    if(rmax-rmin < 86400000){            // un seul jour de données → une étiquette calée à gauche
      const today=new Date().toDateString()===new Date(rmax).toDateString();
      const lab=today?"aujourd'hui":fmtDate(new Date(rmax).toISOString());
      xl=`<text x="${padL}" y="${H-7}" class="cxl" style="text-anchor:start">${lab}</text>`;
    } else {                             // plusieurs jours → graduations sans doublon
      const longSpan=(tmax-tmin)/86400000>182 || new Date(tmin).getFullYear()!==new Date(tmax).getFullYear();
      const fmtX=t=>longSpan ? new Date(t).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}) : fmtDate(new Date(t).toISOString());
      const nT=4; let prev=null;
      for(let i=0;i<=nT;i++){ const t=tmin+(tmax-tmin)*i/nT, lab=fmtX(t);
        if(lab!==prev){ const anc=i===0?'start':i===nT?'end':'middle';
          xl+=`<text x="${X(t).toFixed(1)}" y="${H-7}" class="cxl" style="text-anchor:${anc}">${lab}</text>`; prev=lab; }
      }
    }
  }
  const pts=(points||[]).slice().sort((a,b)=>new Date(a.t)-new Date(b.t));
  let path='';
  if(pts.length){
    const xy=pts.map(pt=>({x:X(new Date(pt.t).getTime()), p:pt.p}));
    const sw=labels?2.6:2.2;
    // la ligne est découpée aux seuils 20/40/60 : chaque morceau prend la couleur de son palier
    let segs='';
    for(let i=0;i+1<xy.length;i++){
      const a=xy[i], b=xy[i+1];
      const cuts=[0,1];
      [20,40,60].forEach(bd=>{ if((a.p-bd)*(b.p-bd)<0) cuts.push((bd-a.p)/(b.p-a.p)); });
      cuts.sort((u,v)=>u-v);
      for(let k=0;k+1<cuts.length;k++){
        const f0=cuts[k], f1=cuts[k+1];
        const p0=a.p+(b.p-a.p)*f0, p1=a.p+(b.p-a.p)*f1;
        const x0=a.x+(b.x-a.x)*f0, x1=a.x+(b.x-a.x)*f1;
        segs+=`<path d="M${x0.toFixed(1)} ${Y(p0).toFixed(1)} L${x1.toFixed(1)} ${Y(p1).toFixed(1)}" fill="none" stroke="${couleur((p0+p1)/2)}" stroke-width="${sw}" stroke-linecap="round"/>`;
      }
    }
    const dots=xy.map((q,i)=>`<circle cx="${q.x.toFixed(1)}" cy="${Y(q.p).toFixed(1)}" r="${labels?3:2.4}" fill="${couleur(q.p)}"><title>${fmtDate(new Date(pts[i].t).toISOString())} · ${pts[i].p} %</title></circle>`).join('');
    const last=xy[xy.length-1];
    const lastDot=`<circle cx="${last.x.toFixed(1)}" cy="${Y(last.p).toFixed(1)}" r="${labels?4:3}" fill="${couleur(last.p)}" stroke="var(--card)" stroke-width="2"/>`;
    path=segs+dots+lastDot;
  }
  return `<svg viewBox="0 0 ${W} ${H}" class="chartsvg">${grid}${xl}${path}</svg>`;
}
function avgChartSVG(m){
  if(!m.chapitres.length) return '<p class="chartempty">Ajoute un chapitre pour suivre ta progression.</p>';
  return lineChart(avgSeries(m), getCSS('--primary'), {w:600,h:210,labels:true});
}
function renderChartAvg(){ const el=document.getElementById('chart'); if(el) el.innerHTML=avgChartSVG(data.matieres[current]); }
function refreshBadge(){
  const m=data.matieres[current];
  const badge=document.querySelector('#detail .badge');
  if(badge){ const moy=moyenne(m.chapitres); badge.textContent=moy+'%'; badge.style.background=couleur(moy); }
  updateGlobal();
}
function addChapitre(mi,nom){ nom=nom.trim(); if(!nom)return; data.matieres[mi].chapitres.push({nom,pct:0,hist:[{t:new Date().toISOString(),p:0}]}); render(); }
function renameChap(ci){ const c=data.matieres[current].chapitres[ci]; const n=prompt("Renommer le chapitre :",c.nom); if(n&&n.trim()){ c.nom=n.trim(); render(); } }
function renameMat(){ const m=data.matieres[current]; const n=prompt("Renommer la matière :",m.nom); if(n&&n.trim()){ m.nom=n.trim(); render(); } }
// Affiche/cache le graphe d'un chapitre (caché par défaut, à la demande)
function toggleChap(ci){
  const mc=document.getElementById('mc-'+ci); if(!mc) return;
  const open=mc.classList.toggle('open');
  const b=document.querySelector(`#detail .chap[data-ci="${ci}"] .seegraph`);
  if(b){ b.classList.toggle('on',open); const s=b.querySelector('span'); if(s) s.textContent = open ? 'Masquer' : 'Graphe'; }
}
function delChapitre(ci){ const m=data.matieres[current]; if(confirm("Supprimer « "+m.chapitres[ci].nom+" » ?")){ m.chapitres.splice(ci,1); render(); } }
function addMatiere(){ const n=prompt("Nom de la matière ?"); if(n&&n.trim()){ data.matieres.push({nom:n.trim(),chapitres:[]}); render(); } }
function delMatiere(i){ if(confirm("Supprimer « "+data.matieres[i].nom+" » et tous ses chapitres ?")){ data.matieres.splice(i,1); current=null; render(); } }
function resetData(){ if(confirm("Tout effacer et repartir de zéro ? Tes changements seront perdus.")){ data=prepare(clone(DEFAULT)); current=null; closeSettings(); render(); } }

function exportData(){ const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='revisions-sauvegarde.json'; a.click(); closeSettings(); }
function importData(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ data=backfillDaily(prepare(JSON.parse(r.result))); current=null; closeSettings(); render(); alert("Importé ✅"); }catch(e){ alert("Fichier invalide."); } };
  r.readAsText(f); }

// ---- Icônes statiques + démarrage ----
document.getElementById('settingsBtn').innerHTML = ic('settings');
document.getElementById('closeSettingsBtn').innerHTML = ic('x');
document.getElementById('btnExport').innerHTML = ic('download')+'<span>Sauvegarder</span>';
document.getElementById('btnImport').innerHTML = ic('upload')+'<span>Importer</span>';
document.getElementById('btnReset').innerHTML = ic('reset')+'<span>Réinitialiser</span>';
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSettings(); });

let savedTheme = localStorage.getItem(THEME_KEY);
if(!THEMES[savedTheme]) savedTheme='slate';   // migration des anciens thèmes (bleu/bleuvert…) → clair
applyTheme(savedTheme);
render();

// --- Mise à jour automatique ---
// À l'ouverture, si EN LIGNE, on vérifie discrètement une version plus récente et on la
// charge (en contournant le cache). Hors-ligne / file:// → no-op : l'app reste utilisable.
(function checkUpdate(){
  try{
    if(location.protocol==='file:') return;
    fetch('index.html?_='+Date.now(), {cache:'no-store'})
      .then(r=>r.ok?r.text():null)
      .then(t=>{
        if(!t) return;
        const m=t.match(/const VERSION = '([^']+)'/);
        if(m && m[1] && m[1]!==VERSION && sessionStorage.getItem('vseen')!==m[1]){
          sessionStorage.setItem('vseen', m[1]);   // garde-fou anti-boucle
          location.replace(location.pathname+'?v='+encodeURIComponent(m[1]));
        }
      }).catch(()=>{});
  }catch(e){}
})();
</script>
