// ---- Mélangeur d'ambiances généré en Web Audio (100% hors-ligne, aucun fichier) ----
// Plusieurs couches mixables, chacune avec son volume ; tout est SYNTHÉTISÉ (pas d'enregistrement).
const MIX_KEY = "suivi-revisions-bac-mix";   // niveaux du mix (préférence appareil, hors export)
const SOUNDS = [
  {key:'pluie',  label:'Pluie',        icon:'rain',  kind:'noise', base:'rose', filter:{type:'highpass',f:900}},
  {key:'vagues', label:'Vagues',       icon:'waves', kind:'noise', base:'brun', lfo:0.09},
  {key:'vent',   label:'Vent',         icon:'wind',  kind:'noise', base:'brun', filter:{type:'lowpass',f:420}, lfo:0.14},
  {key:'feu',    label:'Feu',          icon:'flame', kind:'fire'},
  {key:'oiseaux',label:'Oiseaux',      icon:'bird',  kind:'birds'},
  {key:'bol',    label:'Bol tibétain', icon:'bowl',  kind:'bowl'},
];
function loadMix(){ try{ const r=JSON.parse(localStorage.getItem(MIX_KEY)); if(r && typeof r==='object') return r; }catch(e){} return {pluie:40}; }
function saveMix(){ localStorage.setItem(MIX_KEY, JSON.stringify(mix)); }
let mix = loadMix();
let audioCtx=null, masterGain=null, mixActive=false;
const layers={};   // key -> {src, g, lfo, lg}
// Remplit le buffer selon le type de bruit choisi.
function fillNoise(out, type){
  if(type==='blanc'){
    for(let i=0;i<out.length;i++) out[i]=(Math.random()*2-1)*0.5;
  } else if(type==='brun'){
    let last=0;
    for(let i=0;i<out.length;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; out[i]=last*3.5; }
  } else { // rose (Paul Kellet)
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<out.length;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
      b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      out[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  }
}
function ensureCtx(){
  if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); masterGain=audioCtx.createGain(); masterGain.gain.value=1; masterGain.connect(audioCtx.destination); }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function noiseBuffer(type){ const ctx=audioCtx, b=ctx.createBuffer(1, ctx.sampleRate*4, ctx.sampleRate); fillNoise(b.getChannelData(0), type); return b; }
const rnd=()=>Math.random();   // (les sources audio sont jouées, pas déterministes — OK ici)

// Couche bruitée (pluie / vagues / vent) : buffer filtré + LFO lent optionnel sur le gain.
function buildNoiseLayer(def, v){
  const ctx=audioCtx;
  const src=ctx.createBufferSource(); src.buffer=noiseBuffer(def.base); src.loop=true;
  let out=src;
  if(def.filter){ const f=ctx.createBiquadFilter(); f.type=def.filter.type; f.frequency.value=def.filter.f; out.connect(f); out=f; }
  const g=ctx.createGain(); let lfo=null, lg=null;
  if(def.lfo){ g.gain.value=v*0.55; lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=def.lfo;
    lg=ctx.createGain(); lg.gain.value=v*0.45; lfo.connect(lg).connect(g.gain); lfo.start(); }
  else g.gain.value=v;
  out.connect(g).connect(masterGain); src.start();
  return { setVol(nv){ if(lfo){ g.gain.value=nv*0.55; lg.gain.value=nv*0.45; } else g.gain.value=nv; },
           stop(){ try{src.stop();}catch(e){} try{lfo&&lfo.stop();}catch(e){} [src,g,lfo,lg].forEach(n=>{try{n&&n.disconnect();}catch(e){}}); } };
}
// Feu : grondement (brun + passe-bas) + braises (crépitements aléatoires bandpass).
function buildFireLayer(v){
  const ctx=audioCtx;
  const src=ctx.createBufferSource(); src.buffer=noiseBuffer('brun'); src.loop=true;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=360;
  const g=ctx.createGain(); g.gain.value=v*0.5;
  const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.7; const lg=ctx.createGain(); lg.gain.value=v*0.18;
  lfo.connect(lg).connect(g.gain); lfo.start();
  src.connect(lp).connect(g).connect(masterGain); src.start();
  const crackBuf=ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.3), ctx.sampleRate); fillNoise(crackBuf.getChannelData(0),'blanc');
  let curV=v, timer=null, dead=false;
  function pop(){
    if(curV<=0) return;
    const t=ctx.currentTime;
    const b=ctx.createBufferSource(); b.buffer=crackBuf;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100+rnd()*2600; bp.Q.value=1.1;
    const pg=ctx.createGain(); const amp=curV*(0.12+rnd()*0.5), dur=0.04+rnd()*0.09;
    pg.gain.setValueAtTime(0.0001,t); pg.gain.exponentialRampToValueAtTime(amp,t+0.003); pg.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    b.connect(bp).connect(pg).connect(masterGain); b.start(t); b.stop(t+dur+0.05);
  }
  function loop(){ if(dead) return; timer=setTimeout(()=>{ pop(); loop(); }, 50+rnd()*330); }
  loop();
  return { setVol(nv){ curV=nv; g.gain.value=nv*0.5; lg.gain.value=nv*0.18; },
           stop(){ dead=true; if(timer)clearTimeout(timer); try{src.stop();}catch(e){} try{lfo.stop();}catch(e){} [src,lp,g,lfo,lg].forEach(n=>{try{n.disconnect();}catch(e){}}); } };
}
// Oiseaux : pépiements (oscillateurs avec balayage de hauteur) à intervalles aléatoires.
function buildBirdsLayer(v){
  const ctx=audioCtx; let curV=v, timer=null, dead=false;
  function chirp(){
    const t=ctx.currentTime, notes=1+(rnd()<0.4?1:0)+(rnd()<0.2?1:0);
    for(let i=0;i<notes;i++){ const s=t+i*0.13, f0=1900+rnd()*1700;
      const o=ctx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(f0,s); o.frequency.linearRampToValueAtTime(f0*(1.1+rnd()*0.3),s+0.04); o.frequency.linearRampToValueAtTime(f0*0.9,s+0.11);
      const g=ctx.createGain(); const amp=curV*0.16;
      g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(amp,s+0.01); g.gain.exponentialRampToValueAtTime(0.0001,s+0.12);
      o.connect(g).connect(masterGain); o.start(s); o.stop(s+0.15);
    }
  }
  function loop(){ if(dead) return; timer=setTimeout(()=>{ if(curV>0) chirp(); loop(); }, 500+rnd()*2800); }
  loop();
  return { setVol(nv){ curV=nv; }, stop(){ dead=true; if(timer)clearTimeout(timer); } };
}
// Bol tibétain : bourdon métallique (partiels inharmoniques) + miroitement lent.
function buildBowlLayer(v){
  const ctx=audioCtx; const g=ctx.createGain(); g.gain.value=0; g.connect(masterGain);
  const fund=210, partials=[1,2.76,5.40,8.93];
  const oscs=partials.map((r,i)=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=fund*r*(1+(rnd()*0.004-0.002));
    const pg=ctx.createGain(); pg.gain.value=(i===0?0.5:0.45/(i+1)); o.connect(pg).connect(g); o.start(); return o; });
  const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.15; const lg=ctx.createGain();
  lfo.connect(lg).connect(g.gain); lfo.start();
  function apply(nv){ g.gain.value=nv*0.5; lg.gain.value=nv*0.18; } apply(v);
  return { setVol(nv){ apply(nv); }, stop(){ try{lfo.stop();}catch(e){} oscs.forEach(o=>{try{o.stop();}catch(e){}}); try{g.disconnect();}catch(e){} } };
}
// Démarre une couche selon son type.
function startLayer(key){
  if(layers[key]) return;
  const def=SOUNDS.find(s=>s.key===key); if(!def) return;
  try{ ensureCtx(); const v=(mix[key]||0)/100; let L=null;
    if(def.kind==='noise') L=buildNoiseLayer(def, v);
    else if(def.kind==='fire') L=buildFireLayer(v);
    else if(def.kind==='birds') L=buildBirdsLayer(v);
    else if(def.kind==='bowl') L=buildBowlLayer(v);
    if(L) layers[key]=L;
  }catch(e){}
}
function stopLayer(key){ const L=layers[key]; if(!L) return; try{L.stop();}catch(e){} delete layers[key]; }
function applyLayerVol(key){
  const v=(mix[key]||0)/100, L=layers[key];
  if(v<=0){ stopLayer(key); return; }
  if(!L){ startLayer(key); return; }
  L.setVol(v);
}
// Curseur d'une ambiance : on stocke toujours le niveau ; on agit sur le son seulement si le mix tourne.
function setLayerVol(key,v,el){
  mix[key]=+v; saveMix();
  if(el){ const cell=el.closest('.sndcell'); if(cell) cell.classList.toggle('on', +v>0); }
  if(mixActive) applyLayerVol(key);
}
// Démarre / arrête tout le mix (au lancement/arrêt de session et pendant la méditation).
// On garde les noms startNoise/stopNoise/noisePlaying pour les appelants existants.
function startNoise(){ ensureCtx(); mixActive=true; SOUNDS.forEach(s=>{ if((mix[s.key]||0)>0) startLayer(s.key); }); }
function stopNoise(){ mixActive=false; Object.keys(layers).forEach(stopLayer); }
function noisePlaying(){ return mixActive; }

// ---------- Méditation (« Respire » avant une session) ----------
let brTotal=300, brLeft=300, brTick=null, brPhaseTick=null, brArmed=null;
function brClock(s){ const m=Math.floor(s/60), x=s%60; return m+':'+String(x).padStart(2,'0'); }
function breatheHTML(){
  const mins=Math.round(brTotal/60);
  const durs=[1,3,5].map(m=>`<button class="brdur${m===mins?' on':''}" data-m="${m}" onclick="setBreatheDur(${m})">${m} min</button>`).join('');
  const chain = (brArmed&&matById(brArmed)) ? `<p class="brchain">À la fin, ta session « ${escapeH(matById(brArmed).nom)} » démarre toute seule.</p>` : '';
  return `<div class="brwrap">
    <button class="brquit" onclick="endBreathe(false)" title="Quitter" aria-label="Quitter">${ic('x',22)}</button>
    <p class="brhint">Pose-toi. Respire profondément, ne pense à rien.</p>
    <div class="brcircle"></div>
    <div class="brphase" id="brPhase">Inspire</div>
    <div class="brtime" id="brTime">${brClock(brLeft)}</div>
    <div class="brdurs">${durs}</div>
    ${chain}
    <button class="bigbtn bigwork brstart" onclick="endBreathe(true)"><span>${(brArmed&&matById(brArmed))?'Lancer ma session':'Terminer'}</span></button>
  </div>`;
}
function setBreathePhase(p){ const el=document.getElementById('brPhase'); if(el) el.textContent = p?'Expire':'Inspire'; }
function updateBreathe(){ const el=document.getElementById('brTime'); if(el) el.textContent=brClock(Math.max(0,brLeft)); }
function setBreatheDur(mins){ brTotal=mins*60; brLeft=brTotal; document.querySelectorAll('#breathe .brdur').forEach(b=>b.classList.toggle('on', +b.dataset.m===mins)); updateBreathe(); }
function openBreathe(mins){
  brArmed = armed;                       // si une matière est armée, on enchaîne la session à la fin
  brTotal=(mins||5)*60; brLeft=brTotal;
  const ov=document.getElementById('breathe'); ov.classList.remove('hidden'); ov.innerHTML=breatheHTML();
  startNoise();                          // ambiance pendant la respiration (le tap = geste utilisateur requis pour l'audio)
  let phase=0; setBreathePhase(0);
  if(brTick) clearInterval(brTick);
  brTick=setInterval(()=>{ brLeft--; updateBreathe(); if(brLeft<=0) endBreathe(true); },1000);
  if(brPhaseTick) clearInterval(brPhaseTick);
  brPhaseTick=setInterval(()=>{ phase^=1; setBreathePhase(phase); },4000);   // calé sur l'animation 8 s (4 s inspire / 4 s expire)
}
function endBreathe(launch){
  if(brTick){ clearInterval(brTick); brTick=null; }
  if(brPhaseTick){ clearInterval(brPhaseTick); brPhaseTick=null; }
  document.getElementById('breathe').classList.add('hidden');
  if(launch && brArmed && matById(brArmed)){ armed=brArmed; startSession(); }   // le bruit continue dans la session
  else { if(!data.active) stopNoise(); render(); }   // ne coupe pas le son si une session tourne déjà
  brArmed=null;
}

// ---- Cycle de vie d'une session (mesurée par horodatage début/fin) ----
function armMat(id){ armed=(armed===id?null:id); renderTemps(); }
function startSession(){
  if(!armed || !matById(armed)) return;
  data.active={mat:armed, start:new Date().toISOString()};
  armed=null; startNoise(); save(); render();   // render() affiche le mode focus plein écran
}
function stopSession(){
  if(data.active){
    const s=data.active, end=new Date().toISOString();
    if(Date.parse(end)-Date.parse(s.start) >= 5000)   // < 5 s = tap accidentel, on ignore
      data.sessions.push({mat:s.mat, start:s.start, end});
    data.active=null;
  }
  stopNoise(); save(); render();   // render() masque le mode focus
}

// ---- Affichage du chrono (cosmétique : la durée réelle reste fin − début) ----
function clock(ms){ const s=Math.max(0,Math.floor(ms/1000)),h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60,
  p=n=>String(n).padStart(2,'0'); return h?`${h}:${p(m)}:${p(x)}`:`${p(m)}:${p(x)}`; }
function updateTimer(){
  if(!data.active) return;
  const ms=Date.now()-Date.parse(data.active.start);
  const el=document.getElementById('rtimer'); if(el) el.textContent=clock(ms);
  const w=document.getElementById('rwarn'); if(w) w.style.display = ms>MAX_SESSION_MS ? '' : 'none';
}

// ---- Agrégation par période ----
function fmtDur(ms){
  if(ms<=0) return '0 min';
  const sec=Math.round(ms/1000); if(sec<60) return sec+' s';   // < 1 min → secondes (façon « temps d'écran »)
  const min=Math.round(ms/60000); if(min<60) return min+' min';
  const h=Math.floor(min/60),m=min%60; return m?`${h} h ${String(m).padStart(2,'0')}`:`${h} h`;
}
// Fenêtre affichée [start,end) selon période + décalage : jour = 1 journée ;
// semaine = lundi→dimanche. periodOffset recule (−1 = précédente) ; jamais dans le futur.
function periodWindow(){
  const d=new Date(); d.setHours(0,0,0,0);
  if(period==='jour'){ d.setDate(d.getDate()+periodOffset); const start=d.getTime(); return {start, end:start+86400000}; }
  const wd=(d.getDay()+6)%7;                 // 0 = lundi
  d.setDate(d.getDate()-wd + periodOffset*7); // lundi de la semaine cible
  const start=d.getTime(); return {start, end:start+7*86400000};
}
function sessionsInPeriod(){ const {start,end}=periodWindow();
  return (data.sessions||[]).filter(s=>{ const t=Date.parse(s.start); return s.end && t>=start && t<end; }); }
function matTotals(){
  const tot={};
  sessionsInPeriod().forEach(s=>{ const d=Date.parse(s.end)-Date.parse(s.start); if(d>0) tot[s.mat]=(tot[s.mat]||0)+d; });
  return tot;
}
// Libellé de la fenêtre courante (façon « Aujourd'hui, … » / « Semaine dernière »).
function windowLabel(){
  const {start}=periodWindow();
  if(period==='jour'){
    if(periodOffset===0) return "Aujourd'hui";
    if(periodOffset===-1) return "Hier";
    return new Date(start).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
  }
  if(periodOffset===0) return "Cette semaine";
  if(periodOffset===-1) return "Semaine dernière";
  const a=new Date(start), b=new Date(start+6*86400000);
  return `${a.getDate()} – ${b.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;
}
// Comme « temps d'écran » : tranches (24 heures pour le jour, 7 jours lundi→dimanche pour la semaine),
// chaque tranche cumulée par matière (→ empilage coloré). tipOf = libellé d'infobulle.
function timeBuckets(){
  const {start}=periodWindow();
  let n, idxOf, labelOf, tipOf;
  if(period==='jour'){
    n=24;
    idxOf=t=> new Date(t).getHours();
    labelOf=i=> i%6===0 ? i+'h' : '';
    tipOf=i=> `${i}h–${i+1}h`;
  } else {
    n=7; const WD=['L','M','M','J','V','S','D'];   // start = lundi
    idxOf=t=>{ const d=new Date(t); d.setHours(0,0,0,0); return Math.round((d-start)/86400000); };
    labelOf=i=> WD[i];
    tipOf=i=> new Date(start+i*86400000).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
  }
  const buckets=Array.from({length:n},()=>({total:0,byMat:{}}));
  sessionsInPeriod().forEach(s=>{ const k=idxOf(Date.parse(s.start)); if(k<0||k>=n) return;
    const d=Date.parse(s.end)-Date.parse(s.start); if(d<=0) return;
    buckets[k].total+=d; buckets[k].byMat[s.mat]=(buckets[k].byMat[s.mat]||0)+d; });
  return {buckets, labelOf, tipOf};
}
// Axe Y « joli » : un pas rond donnant ~3-4 graduations au-dessus du max (en minutes).
function niceAxis(maxMin){
  const steps=[10,15,20,30,60,90,120,180,240,360,480,600,720];
  let step=steps[steps.length-1];
  for(const s of steps){ if(maxMin/s<=4){ step=s; break; } }
  return {max:Math.max(step, Math.ceil(maxMin/step)*step), step};
}
function axisLab(min){ if(min<60) return min+'min'; const h=Math.floor(min/60),m=min%60; return m?`${h}h${m}`:`${h}h`; }
// Graphe SVG : barres empilées par tranche de temps + grille + axe à droite + ligne de moyenne.
function barChartSVG(avgMin){
  const {buckets,labelOf,tipOf}=timeBuckets();
  const W=600,H=232,padL=6,padR=42,padT=12,padB=22,plotW=W-padL-padR,plotH=H-padT-padB;
  const maxMin=Math.max(...buckets.map(b=>b.total))/60000;
  if(maxMin<=0) return `<p class="chartempty">Aucune session sur cette période. Lance-toi !</p>`;
  const {max:axMax,step}=niceAxis(maxMin);
  const Y=min=> padT+(1-min/axMax)*plotH;
  let grid='';
  for(let v=0; v<=axMax+0.001; v+=step){ const y=Y(v).toFixed(1);
    grid+=`<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" class="cg"${v===0?'':' opacity="0.5"'}/>`;
    grid+=`<text x="${padL+plotW+5}" y="${(+y+3.5).toFixed(1)}" class="cay">${axisLab(v)}</text>`;
  }
  let avg='';
  if(avgMin>0 && avgMin<=axMax){ const y=Y(avgMin).toFixed(1);
    avg=`<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" class="cavg"/>`
       +`<text x="${padL+plotW+5}" y="${(+y+3.5).toFixed(1)}" class="cay" style="fill:var(--ink)">moy.</text>`;
  }
  // Vue semaine : chaque tranche = 1 jour cliquable (sauf le futur).
  const week=period==='semaine', {start:winStart}=periodWindow();
  const todayMid=(()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
  const dayClickable=i=> week && (winStart+i*86400000)<=todayMid;
  const n=buckets.length, slot=plotW/n, bw=Math.min(slot*0.62, period==='semaine'?30:slot*0.72);
  let bars='', hits='';
  buckets.forEach((b,i)=>{
    const cx=padL+(i+0.5)*slot, x=(cx-bw/2).toFixed(1), clik=dayClickable(i);
    if(clik) hits+=`<rect x="${(padL+i*slot).toFixed(1)}" y="${padT}" width="${slot.toFixed(1)}" height="${(H-padT-2).toFixed(1)}" fill="transparent" style="cursor:pointer" onclick="drillDay(${i})"><title>${escapeH(tipOf(i))} · voir le détail</title></rect>`;
    if(b.total>0){
      let y=padT+plotH, segs='';
      data.matieres.forEach(m=>{ const v=b.byMat[m.id]; if(!v) return;
        const h=v/60000/axMax*plotH; y-=h;
        segs+=`<rect x="${x}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1.5,h).toFixed(1)}" fill="${m.color}"/>`;
      });
      bars+=`<g${clik?` style="cursor:pointer" onclick="drillDay(${i})"`:''}><title>${escapeH(tipOf(i))} · ${fmtDur(b.total)}</title>${segs}</g>`;
    }
    const lab=labelOf(i);
    if(lab) bars+=`<text x="${cx.toFixed(1)}" y="${H-7}" class="cxl">${lab}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="chartsvg timesvg">${grid}${avg}${hits}${bars}</svg>`;
}

// ---- Rendu de la page Temps ----
function renderTemps(){
  const t=document.getElementById('temps');
  t.classList.remove('hidden'); t.classList.remove('fade'); void t.offsetWidth; t.classList.add('fade');

// Sélecteur du type de bruit de fond (généré, hors-ligne).
// Mélangeur d'ambiances : une cellule (icône + label + curseur) par son, mixables.

  const cells=SOUNDS.map(s=>{ const v=mix[s.key]||0;
    return `<div class="sndcell${v>0?' on':''}">

        oninput="setLayerVol('${s.key}',this.value,this)">

  return `<div class="mixer">${cells}</div>`;
}
// ---------- Page Stats (« Temps de travail », façon temps d'écran) ----------

// Les contrôles du graphe (période, navigation, couleurs) rafraîchissent la page Stats.
function renderTempsStats(){ if(page==='stats') renderStats(); }
// Au chargement : une session laissée ouverte depuis > MAX_SESSION_H est présumée oubliée → on l'annule (non comptée).
function recoverStaleSession(){
  if(data.active && Date.now()-Date.parse(data.active.start) > MAX_SESSION_MS){
    data.active=null; staleRecovered=true; save();
  }
}
function pickerCard(){

// Contenu du mode focus plein écran (session en cours).
function focusCard(){
  const m=matById(data.active.mat);

  const col=m?m.color:'var(--muted)';

  </div>`;
}
// Affiche/masque le mode focus selon qu'une session est active. Idempotent (ne reconstruit qu'aux transitions).
let focusShown=false;
function renderFocus(){
  const f=document.getElementById('focus');
  if(data.active && !focusShown){
    f.innerHTML=focusCard(); f.classList.remove('hidden'); focusShown=true;
    if(tick) clearInterval(tick); updateTimer(); tick=setInterval(updateTimer,1000);
  } else if(!data.active && focusShown){
    f.classList.add('hidden'); f.innerHTML=''; focusShown=false;
    if(tick){ clearInterval(tick); tick=null; }
  }
}
// Reconstruit le contenu du focus (ex. après « Activer le son »).
function refreshFocus(){ if(!data.active) return; document.getElementById('focus').innerHTML=focusCard();
  if(tick) clearInterval(tick); updateTimer(); tick=setInterval(updateTimer,1000); }
function graphCard(){
  const tot=matTotals();
  const sum=Object.values(tot).reduce((a,b)=>a+b,0);
  const segl={jour:'Jour',semaine:'Semaine'};
  const seg=['jour','semaine'].map(p=>`<button class="segb${period===p?' on':''}" onclick="setPeriod('${p}')">${segl[p]}</button>`).join('');
  // Navigation : reculer/avancer d'une fenêtre (jamais dans le futur).
  const nav=`<div class="navper">
    <button class="pnav" onclick="shiftPeriod(-1)" title="Précédent" aria-label="Période précédente">${ic('chevleft',18)}</button>
    <span class="plabelw">${windowLabel()}</span>
    <button class="pnav" onclick="shiftPeriod(1)" ${periodOffset>=0?'disabled':''} title="Suivant" aria-label="Période suivante">${ic('chevron',18)}</button>
  </div>`;
  // Moyenne quotidienne (vue semaine) : vraie donnée = total / jours pris en compte.
  let avgMs=0, sub='';
  if(period==='semaine' && sum>0){
    const {start}=periodWindow(); let div=7;
    if(periodOffset===0){ const t=new Date(); t.setHours(0,0,0,0); div=Math.round((t-start)/86400000)+1; }
    avgMs=sum/Math.max(1,div);
    sub=`Moyenne ${fmtDur(avgMs)} / jour`;
  }
  const barsHtml = barChartSVG(avgMs/60000);   // SVG : barres empilées + grille + axe + ligne de moyenne
  // Légende = gestion des couleurs : toutes les matières, pastille éditable + total sur la période.
  const legend=`<div class="legend">`+data.matieres.map(m=>`<div class="legrow">
      <button class="legdot" style="--c:${m.color}" title="Changer la couleur" aria-label="Changer la couleur de ${escapeH(m.nom)}" onclick="openColorPick('${m.id}',this)"></button>
      <span class="legname">${escapeH(m.nom)}</span>
      <span class="legtime">${fmtDur(tot[m.id]||0)}</span></div>`).join('')+`</div>`;
  return `<div class="card">
    <div class="seg">${seg}</div>
    ${nav}
    <div class="sttotal">${fmtDur(sum)}</div>
    ${sub?`<div class="stsub">${sub}</div>`:''}
    ${barsHtml}
    ${legend}
  </div>`;
}
// Changer Jour⇄Semaine garde la position dans le temps (façon « temps d'écran ») :
// revenir de Jour → Semaine ramène sur LA semaine du jour affiché, pas la semaine courante.
function setPeriod(p){
  if(p===period){ renderTempsStats(); return; }
  const today=new Date(); today.setHours(0,0,0,0);
  const monOf=ms=>{ const d=new Date(ms); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.getTime(); };
  const {start}=periodWindow();            // début de la fenêtre actuelle (jour ou lundi)
  if(p==='semaine'){
    periodOffset=Math.round((monOf(start)-monOf(today.getTime()))/(7*86400000));
  }else{
    const target=Math.min(start+6*86400000, today.getTime());  // aujourd'hui si semaine courante, sinon dimanche
    periodOffset=Math.round((target-today.getTime())/86400000);
  }
  period=p; renderTempsStats();
}
function shiftPeriod(d){ if(periodOffset+d>0) return; periodOffset+=d; renderTempsStats(); }
// Vue semaine : cliquer un jour ouvre son détail heure-par-heure (façon « temps d'écran »). Jamais le futur.
function drillDay(i){
  const {start}=periodWindow();                 // lundi de la semaine affichée
  const today=new Date(); today.setHours(0,0,0,0);
  const off=Math.round((start+i*86400000-today.getTime())/86400000);
  if(off>0) return;
  period='jour'; periodOffset=off; renderTempsStats();
}

// ---- Sélecteur de couleur maison (offline, ancré au clic) ----
// Panneau interne = carré saturation/valeur + curseur de teinte + hex. Aucun panneau OS
// (le natif ne s'ouvre pas de façon fiable dans Safari et se plaçait dans un coin).
let cpH=0, cpS=0, cpV=0, cpOnPick=null;   // teinte 0-360, sat/val 0-1
function hexToHsv(hex){ if(!/^#?[0-9a-f]{6}$/i.test(hex||'')) return null; hex=hex.replace('#','');
  const r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn; let h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  return {h, s: mx? d/mx : 0, v: mx}; }
function hsvToHex(h,s,v){ const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c; let r,g,b;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  const to=n=>Math.round((n+m)*255).toString(16).padStart(2,'0'); return '#'+to(r)+to(g)+to(b); }
// Ouvre le sélecteur près de `anchor`, initialisé sur `currentHex` ; `onPick(hex)` à la fermeture.
function openPicker(anchor, currentHex, onPick){
  cpOnPick=onPick; const hsv=hexToHsv(currentHex)||{h:210,s:.55,v:.9}; cpH=hsv.h; cpS=hsv.s; cpV=hsv.v;
  document.getElementById('cpHue').value=Math.round(cpH);
  document.getElementById('cpick').classList.remove('hidden');
  cpickRender();
  const panel=document.getElementById('cpickPanel');
  const r=(anchor&&anchor.getBoundingClientRect)?anchor.getBoundingClientRect():null;
  let left = r? r.left : (innerWidth-panel.offsetWidth)/2;
  let top  = r? r.bottom+6 : innerHeight*0.25;
  left=Math.max(8, Math.min(left, innerWidth  - panel.offsetWidth  - 8));
  top =Math.max(8, Math.min(top,  innerHeight - panel.offsetHeight - 8));
  panel.style.left=left+'px'; panel.style.top=top+'px';
}
function cpickRender(){
  const hex=hsvToHex(cpH,cpS,cpV);
  document.getElementById('cpSV').style.background=
    `linear-gradient(to bottom, transparent, #000), linear-gradient(to right, #fff, hsl(${cpH},100%,50%))`;
  const th=document.getElementById('cpThumb'); th.style.left=(cpS*100)+'%'; th.style.top=((1-cpV)*100)+'%';
  th.style.background=hex;
  document.getElementById('cpPrev').style.background=hex;
  const hx=document.getElementById('cpHex'); if(document.activeElement!==hx) hx.value=hex.toUpperCase();
}
function closeCPick(){ const ov=document.getElementById('cpick'); if(!ov||ov.classList.contains('hidden')) return;
  ov.classList.add('hidden'); const cb=cpOnPick; cpOnPick=null; if(cb) cb(hsvToHex(cpH,cpS,cpV)); }
// Compat : les appelants existants (.dotbtn, .legdot) passent une matière → applique + re-render.
function openColorPick(id, anchor){ const m=matById(id); if(!m) return;
  openPicker(anchor, m.color, hex=>{ const mm=matById(id); if(mm){ mm.color=hex; save(); render(); } }); }

// ---- Modale maison : remplace prompt()/confirm() natifs (rendu cohérent avec l'app) ----
let modalResolve=null;
function closeModal(val){
  const m=document.getElementById('modal');
  m.classList.add('hidden'); m.innerHTML='';
  const r=modalResolve; modalResolve=null; if(r) r(val);
}
// Confirmation → Promise<boolean>. danger = bouton rouge.
function uiConfirm(message,{title='Confirmer',ok='Confirmer',danger=false}={}){
  return new Promise(res=>{ modalResolve=res;
    const m=document.getElementById('modal');
    m.innerHTML=`<div class="panel" role="dialog" aria-modal="true">
      <div class="phead"><span>${escapeH(title)}</span>
        <button class="iconbtn" aria-label="Fermer" onclick="closeModal(false)">${ic('x')}</button></div>
      <p class="mdmsg">${escapeH(message)}</p>
      <div class="mdactions">
        <button class="mdbtn" onclick="closeModal(false)">Annuler</button>
        <button class="mdbtn ${danger?'danger':'primary'}" onclick="closeModal(true)">${escapeH(ok)}</button>
      </div></div>`;
    m.classList.remove('hidden');
    const b=m.querySelector('.mdbtn:last-child'); if(b) b.focus();
  });
}
// Saisie texte → Promise<string|null> (null = annulé).
function uiPrompt(def='',{title='Renommer',ok='Valider',message=''}={}){
  return new Promise(res=>{ modalResolve=res;
    const m=document.getElementById('modal');
    m.innerHTML=`<div class="panel" role="dialog" aria-modal="true">
      <div class="phead"><span>${escapeH(title)}</span>
        <button class="iconbtn" aria-label="Fermer" onclick="closeModal(null)">${ic('x')}</button></div>
      ${message?`<p class="mdmsg">${escapeH(message)}</p>`:''}
      <input id="mdInput" class="mdinput" type="text" value="${escapeH(def)}" maxlength="120"
        onkeydown="if(event.key==='Enter')submitPrompt();else if(event.key==='Escape')closeModal(null)">
      <div class="mdactions">
        <button class="mdbtn" onclick="closeModal(null)">Annuler</button>
        <button class="mdbtn primary" onclick="submitPrompt()">${escapeH(ok)}</button>
      </div></div>`;
    m.classList.remove('hidden');
    const i=document.getElementById('mdInput'); if(i){ i.focus(); i.select(); }
  });
}
function submitPrompt(){ const i=document.getElementById('mdInput'); closeModal(i?i.value:null); }

// Modale « Nouvelle matière » : nom + choix de la couleur → Promise<{nom,color}|null>.
let newMatColor=null;
// Une seule pastille = la couleur choisie ; taper ouvre le sélecteur maison (pas de presets).
function nmColorHTML(){ const v=newMatColor||'#888888';
  return `<button type="button" class="nmcolor" title="Choisir la couleur" aria-label="Choisir la couleur" style="background:${v}"
    onclick="openPicker(this, newMatColor||'#888888', function(hex){ pickNewMatColor(hex); })"></button>`; }
function pickNewMatColor(c){ newMatColor=c; const box=document.getElementById('nmSwatches'); if(box) box.innerHTML=nmColorHTML(); }
function promptNewMatiere(){
  return new Promise(res=>{ modalResolve=res;
    const m=document.getElementById('modal');
    m.innerHTML=`<div class="panel" role="dialog" aria-modal="true">
      <div class="phead"><span>Nouvelle matière</span>
        <button class="iconbtn" aria-label="Fermer" onclick="closeModal(null)">${ic('x')}</button></div>
      <input id="mdInput" class="mdinput" type="text" value="" maxlength="120" placeholder="Nom de la matière"
        onkeydown="if(event.key==='Enter')submitNewMat();else if(event.key==='Escape')closeModal(null)">
      <p class="mdmsg" style="margin:14px 0 8px;font-weight:600">Couleur</p>
      <div id="nmSwatches">${nmColorHTML()}</div>
      <div class="mdactions">
        <button class="mdbtn" onclick="closeModal(null)">Annuler</button>
        <button class="mdbtn primary" onclick="submitNewMat()">Ajouter</button>
      </div></div>`;
    m.classList.remove('hidden');
    const i=document.getElementById('mdInput'); if(i) i.focus();
  });
}
function submitNewMat(){ const i=document.getElementById('mdInput'); closeModal(i?{nom:i.value,color:newMatColor}:null); }

// ---- Icônes statiques + démarrage ----
// Icônes de la barre de navigation flottante.
const TAB_ICONS = {accueil:'home', matieres:'book', session:'clock', stats:'bars', reglages:'settings'};
document.querySelectorAll('#tabbar .tab').forEach(b=>{
  const span=b.querySelector('.tabic'); if(span) span.innerHTML=ic(TAB_ICONS[b.dataset.p]||'home',22);
});
{ const sbl=document.getElementById('sbLogo'); if(sbl) sbl.innerHTML=ic('book',18); }
{ const tci=document.getElementById('tbCtaIc'); if(tci) tci.innerHTML=ic('plus',18); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){
  const cp=document.getElementById('cpick'); if(cp && !cp.classList.contains('hidden')){ closeCPick(); return; }
  const md=document.getElementById('modal'); if(md && !md.classList.contains('hidden')) closeModal(null); } });
// Interactions du sélecteur de couleur maison (carré S/V + teinte + hex), câblées une fois.
(function(){ const sv=document.getElementById('cpSV'); if(!sv) return; let drag=false;
  const pick=e=>{ const r=sv.getBoundingClientRect();
    cpS=Math.min(Math.max((e.clientX-r.left)/r.width,0),1);
    cpV=1-Math.min(Math.max((e.clientY-r.top)/r.height,0),1); cpickRender(); };
  sv.addEventListener('pointerdown', e=>{ drag=true; sv.setPointerCapture(e.pointerId); pick(e); });
  sv.addEventListener('pointermove', e=>{ if(drag) pick(e); });
  sv.addEventListener('pointerup', ()=>{ drag=false; });
  document.getElementById('cpHue').addEventListener('input', e=>{ cpH=+e.target.value; cpickRender(); });
  document.getElementById('cpHex').addEventListener('change', e=>{ const v=hexToHsv(e.target.value.trim());
    if(v){ cpH=v.h; cpS=v.s; cpV=v.v; document.getElementById('cpHue').value=Math.round(cpH); } cpickRender(); });
})();
// iOS suspend l'audio en arrière-plan : on le relance au retour si une session tourne.
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && audioCtx && mixActive && audioCtx.state==='suspended') audioCtx.resume(); });

let savedTheme = localStorage.getItem(THEME_KEY);
if(savedTheme!=='auto' && !THEMES[savedTheme]) savedTheme='slate';   // 'auto' est valide ; migration des anciens thèmes (bleu/bleuvert…) → clair
applyTheme(savedTheme);
recoverStaleSession();
// Garde-fou : si l'affichage plante sur un état inattendu, on montre un écran de secours
// (tes données restent intactes) plutôt qu'une page blanche irrécupérable.
try{ render(); }
catch(e){
  console.error(e);
  document.querySelector('.wrap').innerHTML =
    `<div class="empty">
      <h2>Oups, souci d'affichage</h2>
      <p>Tes données sont toujours là. Sauvegarde-les d'abord, puis recharge proprement si besoin.</p>
      <button class="cta" onclick="exportData()">${ic('download',20)}<span>Sauvegarder mes données</span></button>
      <button class="dbtn danger" style="margin:14px auto 0;max-width:300px"
        onclick="if(confirm('Effacer les données et recharger ?')){localStorage.removeItem(STORE_KEY);location.reload();}">
        ${ic('reset',18)}<span>Réinitialiser l'affichage</span></button>
    </div>`;
}

// --- Mise à jour automatique ---
// À l'ouverture, si EN LIGNE, on vérifie discrètement une version plus récente et on la
// charge (en contournant le cache). Hors-ligne / file:// → no-op : l'app reste utilisable.
(function checkUpdate(){
  try{
    if(location.protocol==='file:') return;
    fetch('index.html?_='+Date.now(), {cache:'no-store'})
      .then(r=>r.ok?r.text():null)
      .then(t=>{
        if(!t) return;
        const m=t.match(/const VERSION = '([^']+)'/);
        if(m && m[1] && m[1]!==VERSION && sessionStorage.getItem('vseen')!==m[1]){
          sessionStorage.setItem('vseen', m[1]);   // garde-fou anti-boucle
          location.replace(location.pathname+'?v='+encodeURIComponent(m[1]));
        }
      }).catch(()=>{});
  }catch(e){}
})();
</script>
